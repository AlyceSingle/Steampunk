    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;

            --panel-bg-color: #ffffff;
            --accent-color: #007bff;
            --body-bg-color: #e9ecef;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --glow-color: rgba(0, 123, 255, 0.3);
            --hover-bg-color: rgba(0, 123, 255, 0.05);
            --option-bg-color: #ffffff;
            --transition-speed: 0.3s;
            --collapse-speed: 0.5s;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

            justify-content: center;
            align-items: flex-start;

            margin: 0;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        .selector-container {
            background: var(--bg-color);

            max-width: 600px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 60px var(--shadow-color);
            position: relative;
            overflow: hidden;

            margin: 0;
        }

            content: '';
            position: absolute;

        }

            padding: 20px 40px;

            user-select: none;
            transition: background var(--transition-speed) ease;

            z-index: 2;
        }

        .selector-header:hover {
            background: var(--hover-bg-color);
        }

        .header-title {

        .header-subtitle {

        }

</head>

<body>
    <div class="selector-container" id="selector-card">
        <div class="selector-header" id="selector-header">
            <h2 class="header-title">请选择一个选项</h2>
            <p class="header-subtitle">点击展开查看所有选项</p>
            <div class="expand-indicator">▼</div>
        </div>
        <div class="options-collapsible" id="options-collapsible">
            <div class="options-wrapper">
                <div class="options-container" id="options-container"></div>
            </div>
        </div>
    </div>
    
    <div id="raw-options-data" style="display:none">$1</div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const elements = {
                card: document.getElementById('selector-card'),
                header: document.getElementById('selector-header'),
                collapsible: document.getElementById('options-collapsible'),
                container: document.getElementById('options-container'),
                rawData: document.getElementById('raw-options-data')
            };

            // 检查必要元素
            if (!elements.card || !elements.rawData || !elements.container) {
                console.error("选择器必要元素未找到");
                return;
            }

            // 解析并渲染选项
            function parseAndRenderOptions() {
                const rawText = elements.rawData.textContent.trim();
                const lines = rawText.split(/\r?\n/).filter(line => line.trim() !== "");
                
                if (lines.length === 0) {
                    elements.container.innerHTML = '<div class="empty-state">暂无可选项</div>';
                    return;
                }

                lines.forEach(line => {
                    const optionText = line.trim().replace(/^[A-Z]\.\s*/i, "");
                    if (optionText) {
                        const optionElement = document.createElement("div");
                        optionElement.className = "option-item";
                        optionElement.setAttribute("data-action", optionText);
                        optionElement.innerHTML = `<div class="option-text">${optionText}</div>`;
                        
                        // 点击选项事件
                        optionElement.addEventListener("click", function (e) {
                            e.stopPropagation();
                            const action = this.getAttribute("data-action");
                            handleOptionClick(action);
                        });
                        
                        elements.container.appendChild(optionElement);
                    }
                });
            }

            // 处理选项点击
            function handleOptionClick(action) {
                try {
                    const parentTextarea = window.parent.document.querySelector("#send_textarea");
                    const triggerSlash = window.parent.triggerSlash;
                    
                    if (parentTextarea) {
                        const newValue = parentTextarea.value + action;
                        if (triggerSlash) {
                            triggerSlash(`/setinput ${newValue}`);
                        } else {
                            parentTextarea.value = newValue;
                            parentTextarea.dispatchEvent(new Event("input", { bubbles: true }));
                        }
                    } else if (triggerSlash) {
                        triggerSlash(`/setinput ${action}`);
                    }
                } catch (error) {
                    console.error("设置输入文本时出错:", error);
                }
            }

            // 切换展开/收起
            function initToggle() {
                elements.header.addEventListener("click", function (e) {
                    // 如果点击的是选项，不触发展开/收起
                    const isOptionClick = [...elements.container.querySelectorAll(".option-item")]
                        .some(option => option && option.contains(e.target));
                    
                    if (!isOptionClick) {
                        elements.card.classList.toggle("open");
                    }
                });
            }

            // 初始化
            parseAndRenderOptions();
            initToggle();
        });
    </script>
</body>
