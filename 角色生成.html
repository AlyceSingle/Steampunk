<body>

                </div>

                </div>
                
                <div class="profile-item" data-field="衣物装饰">

    <!-- SillyTavern会自动将Creator's Notes注入到这个标签中 -->
    <script id="data-source" type="text/yaml">$1</script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
        // ========== 工具函数 (用户提供) ==========
        function hexToRgb(hex) { 
            if (!hex || typeof hex !== 'string') return '128, 128, 128'; 
            hex = hex.replace(/^#/, ''); 
            if (hex.length === 3) hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2]; 
            const r = parseInt(hex.substring(0, 2), 16); 
            const g = parseInt(hex.substring(2, 4), 16); 
            const b = parseInt(hex.substring(4, 6), 16); 
            return `${r}, ${g}, ${b}`; 
        }

        function getSmartArray(input) { 
            if (input === undefined || input === null) return []; 
            if (Array.isArray(input)) return input; 
            const str = String(input).trim(); 
            if (!str || str.toLowerCase() === 'null' || str.toLowerCase() === 'none') return []; 
            let processed = str.replace(/\]\s*\[/g, '], ['); 
            processed = processed.replace(/^[\s\["']+|[\s\]"']+$/g, ''); 
            const items = processed.split(/[,;|，；、]/); 
            return items.map(s => s.trim().replace(/^['"\[\(]+|['"\]\)]+$/g, '')).filter(s => s && s !== 'null'); 
        }

        function cleanYaml(yamlStr){
            if(!yamlStr)return'';
            yamlStr=yamlStr.replace(/\u00A0/g,' ').replace(/\t/g,'  ').replace(/：/g,': ').replace(/，/g,',').replace(/；/g,';').replace(/】/g,']').replace(/【/g,'[');
            const lines=yamlStr.split('\n');
            const sensitiveKeys=['身份','职业','性格','喜爱','外貌特质','衣物装饰','背景故事','描述','效果','标签','消耗','类型','品质','神位','名称','姓名','种族','等级','生命层级'];
            const attrKeys=['力量','敏捷','体质','智力','精神'];
            const cleanedLines=lines.map(line=>{
                const match=line.match(/^(\s*)([-\w\u4e00-\u9fa5]+)\s*:\s*(.+)$/);
                if(!match)return line;
                const indent=match[1];
                const key=match[2];
                let val=match[3].trim();
                if(val.startsWith('|')||val.startsWith('>'))return line;
                if(attrKeys.some(k=>key.includes(k))){
                    if((/[+=]/.test(val)||val.includes('{'))&&!/^["'].*["']$/.test(val)){
                        val=val.replace(/"/g,'\\"');
                        return`${indent}${key}: \"${val}\"`;
                    }
                }
                const isSensitive=sensitiveKeys.some(k=>key.includes(k));
                const hasDangerousChars=/[\{\}\[\]]/.test(val);
                const hasQuoteInside=val.includes('\"');
                const isFullyQuoted=/^["'].*["']$/.test(val);
                if((isSensitive||hasDangerousChars||hasQuoteInside)&&!isFullyQuoted){
                    val=val.replace(/"/g,'\\"');
                    return`${indent}${key}: \"${val}\"`;
                }
                return line;
            });
            return cleanedLines.join('\n');
        }

        function parseRobust(yamlStr) { 
            try { 
                return jsyaml.load(cleanYaml(yamlStr)); 
            } catch (e) { 
                console.error('YAML Parsing failed:', e, 'Cleaned YAML:', cleanYaml(yamlStr)); 
                return null; 
            } 
        }

        function hasText(val) { 
            if (val === null || val === undefined) return false; 
            const s = String(val).trim().toLowerCase(); 
            return s !== '' && s !== 'null' && s !== 'none' && s !== '[]' && s !== '无'; 
        }

        function hasArrayContent(arr) { 
            if (!arr || !Array.isArray(arr)) return false; 
            return arr.length > 0 && arr.some(item => hasText(item)); 
        }

        // ========== 数据获取与渲染 ==========
        let globalCharacterData = null;
        let globalOriginalYaml = '';

        function renderCharacterProfile(data, originalYaml) {
            if (!data) {
                showToast('数据解析失败', 'error');
                return;
            }

            globalCharacterData = data;
            globalOriginalYaml = originalYaml;

            // 渲染姓名
            const nameEl = document.querySelector('[data-name]');
            if (nameEl) {
                nameEl.textContent = data.姓名 || '未知角色';
            }

            // 渲染核心信息
            const coreInfoEl = document.querySelector('[data-core-info]');
            if (coreInfoEl) {
                const formatList = (val) => getSmartArray(val).join(' / ') || '无';
                coreInfoEl.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">身份</span>
                        <span class="info-value">${formatList(data.身份)}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">职业</span>
                        <span class="info-value">${formatList(data.职业)}</span>
                    </div>
                `;
            }

            // 渲染详细信息
            const fields = ['性格', '喜爱', '外貌特质', '衣物装饰', '背景故事'];
            fields.forEach(field => {
                const el = document.querySelector(`[data-field="${field}"]`);
                if (el) {
                    const content = el.querySelector('.profile-content');
                    const value = data[field];
                    
                    if (hasText(value)) {
                        const displayValue = Array.isArray(value) 
                            ? getSmartArray(value).join(', ') 
                            : String(value);
                        content.textContent = displayValue;
                        el.style.display = 'block';
                    } else {
                        el.style.display = 'none';
                    }
                }
            });

            // 隐藏加载动画
            const loadingEl = document.getElementById('loading-indicator');
            if (loadingEl) {
                loadingEl.classList.add('hidden');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'success' ? '✓ ' + message : '! ' + message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ========== 保存到世界书 ==========
        let hasSaved = false; // 跟踪是否已保存

        function generateYAML(data) {
            const formatBlock = (text) => {
                if (!text) return '';
                return `|\n  ${text.replace(/\n/g, '\n  ')}`; 
            };

            const formatList = (arr) => {
                const items = getSmartArray(arr);
                return items.length > 0 ? items.join(', ') : '无';
            };

            const characterName = data.姓名 || '未知';
            const content = [
                `姓名: ${characterName}`,
                `身份: ${formatList(data.身份)}`,
                `职业: ${formatList(data.职业)}`,
                `性格: ${formatBlock(data.性格 || '')}`,
                `喜爱: ${formatBlock(data.喜爱 || '')}`,
                `外貌特质: ${formatBlock(data.外貌特质 || '')}`,
                `衣物装饰: ${formatBlock(data.衣物装饰 || '')}`,
                `背景故事: ${formatBlock(data.背景故事 || '')}`
            ].join('\n');

            // 用角色姓名标签包裹
            return `<${characterName}>\n${content}\n</${characterName}>`;
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            
            // 检查是否已保存
            if (hasSaved) {
                showToast('已经保存过了，无需重复保存', 'error');
                return;
            }

            if (!globalCharacterData) {
                showToast('没有可保存的数据', 'error');
                return;
            }

            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const api = window.TavernHelper || window;
                
                if (typeof api.getWorldbookNames !== 'function' || typeof api.createWorldbookEntries !== 'function') {
                    throw new Error('未检测到 Worldbook API');
                }

                const worldbookName = '在这个蒸汽朋克且阶级分化的世界，多样的政治势力，外加一群可爱美少女，我的异世界冒险不可能这么丰富多彩！';
                
                // 确保世界书存在
                const books = await api.getWorldbookNames();
                if (!books.includes(worldbookName)) {
                    await api.createWorldbook(worldbookName, []);
                }

                const characterName = globalCharacterData.姓名 || '未知角色';
                const content = globalOriginalYaml || generateYAML(globalCharacterData);

                const entry = {
                    name: characterName,
                    enabled: true,
                    strategy: {
                        type: 'selective',
                        keys: [characterName],
                        keys_secondary: { logic: 'and_any', keys: [] },
                        scan_depth: 'same_as_global'
                    },
                    position: {
                        type: 'after_character_definition',
                        role: 'system',
                        depth: 0,
                        order: 9000
                    },
                    content: content,
                    probability: 100,
                    recursion: {
                        prevent_incoming: false,
                        prevent_outgoing: true,
                        delay_until: null
                    },
                    effect: {
                        sticky: null,
                        cooldown: null,
                        delay: null
                    }
                };

                await api.createWorldbookEntries(worldbookName, [entry]);
                hasSaved = true; // 标记已保存
                showToast('✓ 保存成功！角色已录入世界书', 'success');
                btn.innerHTML = '✓ 已保存';
                // 保持按钮禁用状态
            } catch (err) {
                console.error('保存失败:', err);
                showToast('保存失败: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // ========== 初始化 ==========
        const yamlDataSource = document.getElementById('data-source');
        if (yamlDataSource) {
            const rawYaml = yamlDataSource.textContent;
            if (rawYaml && rawYaml.trim()) {
                const data = parseRobust(rawYaml);
                if (data) { 
                    renderCharacterProfile(data, rawYaml); 
                } else { 
                    const loadingEl = document.getElementById('loading-indicator');
                    if (loadingEl) {
                         loadingEl.innerHTML = `<div style="color: #ff6b6b; padding: 20px; font-family: sans-serif; text-align: center; background: rgba(255,255,255,0.9); border-radius: 10px;"><h3>解析错误</h3><p>数据格式似乎有误，请检查YAML。</p></div>`; 
                    }
                }
            }
        }
    });

    </script>
