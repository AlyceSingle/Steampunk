<!DOCTYPE html>
<html>
<!-- Single出品,仅在类脑旅程发布 -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>神骸之城·依希利亚 - 完整自由创造模式</title>

  <style>
    /* 使用系统字体，不依赖任何外部资源 */
    :root {
      --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      --font-mono: 'Courier New', Consolas, Monaco, 'Lucida Console', monospace;
    }

    :root {
      --bg-color: #f8f9fa;
      --text-color: #212529;
      --border-color: #dee2e6;
      --panel-bg-color: #ffffff;
      --accent-color: #007bff;
      --accent-secondary: #6610f2;
      --body-bg-color: #e9ecef;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --glow-color: rgba(0, 123, 255, 0.3);
      --success-color: #28a745;
      --danger-color: #dc3545;
      --warning-color: #ffc107;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--body-bg-color) 0%, #d4d9e0 100%);
      margin: 0;
      font-family: var(--font-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(0, 123, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(187, 134, 252, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #theme-toggle {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 44px;
      height: 44px;
      background: var(--panel-bg-color);
      border: 2px solid var(--border-color);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 12px var(--shadow-color);
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 10;
    }

    #theme-toggle:hover {
      transform: scale(1.15) rotate(180deg);
      box-shadow: 0 8px 20px var(--glow-color);
    }

    #theme-toggle svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-color);
    }

    .theme-dropdown {
      position: fixed;
      top: 65px;
      left: 15px;
      background: var(--panel-bg-color);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 8px 24px var(--shadow-color);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      overflow: hidden;
      z-index: 9;
    }

    .theme-dropdown.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .theme-option {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.9em;
      font-weight: 600;
      color: var(--text-color);
      white-space: nowrap;
    }

    .theme-option:hover {
      background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
      color: white;
    }

    .theme-option.active {
      background: rgba(0, 123, 255, 0.1);
      color: var(--accent-color);
    }

    .creator-container {
      background: var(--bg-color);
      width: 90%;
      max-width: 1200px;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      box-shadow: 0 20px 60px var(--shadow-color), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
      overflow: visible;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
      margin-bottom: 40px;
    }

    .creator-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent-color) 0%, var(--accent-secondary) 50%, var(--accent-color) 100%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
      border-radius: 20px 20px 0 0;
    }

    @keyframes shimmer {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .creator-header {
      padding: 50px 50px 30px;
      text-align: center;
      border-bottom: 2px solid var(--border-color);
      background: linear-gradient(180deg, rgba(0, 123, 255, 0.03), transparent);
    }

    .creator-header h1 {
      margin: 0 0 10px;
      font-size: 2.5em;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: var(--font-mono);
      letter-spacing: 2px;
    }

    .creator-header p {
      margin: 0;
      color: #6c757d;
      font-size: 1em;
    }

    .creator-content {
      padding: 40px 50px;
    }

    .form-section {
      margin-bottom: 35px;
    }

    .form-section h3 {
      font-size: 1.3em;
      color: var(--text-color);
      margin: 0 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-color);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-actions {
      display: flex;
      gap: 10px;
    }

    .add-item-btn {
      padding: 6px 12px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-item-btn:hover {
      background: var(--accent-secondary);
      transform: scale(1.05);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-color);
      font-weight: 600;
      font-size: 0.95em;
    }

    .form-group label .optional {
      color: #6c757d;
      font-weight: 400;
      font-size: 0.9em;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1em;
      font-family: 'Noto Sans SC', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--glow-color);
      transform: translateY(-2px);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }

    .radio-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 140px;
    }

    .radio-option input[type="radio"],
    .radio-option input[type="checkbox"] {
      display: none;
    }

    .radio-option label {
      display: block;
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: white;
      font-weight: 600;
    }

    .radio-option input[type="radio"]:checked+label,
    .radio-option input[type="checkbox"]:checked+label {
      background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
      color: white;
      border-color: var(--accent-color);
      box-shadow: 0 4px 15px var(--glow-color);
      transform: translateY(-2px);
    }

    .radio-option label:hover {
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }

    #attributes-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 480px) {
      #attributes-container {
        grid-template-columns: 1fr 1fr;
      }
    }

    .point-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(0, 123, 255, 0.05);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .point-control:hover {
      border-color: var(--accent-color);
      transform: translateX(5px);
    }

    .point-control .label {
      font-weight: 700;
      color: var(--text-color);
      font-size: 1em;
      flex-shrink: 0;
    }

    .point-control .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .point-control input {
      width: 60px;
      text-align: center;
      font-weight: 700;
      font-size: 1.1em;
      color: var(--accent-color);
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 6px;
      padding: 6px;
      font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
    }

    .point-control input:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .adjust-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.2em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .adjust-btn:hover:not(:disabled) {
      background: var(--accent-secondary);
      transform: scale(1.1);
    }

    .adjust-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .dynamic-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .list-item {
      padding: 15px;
      background: rgba(0, 123, 255, 0.03);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      position: relative;
    }

    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .list-item-title {
      font-weight: 700;
      color: var(--accent-color);
      font-size: 1.05em;
    }

    .remove-item-btn {
      padding: 4px 12px;
      background: var(--danger-color);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .remove-item-btn:hover {
      background: #c82333;
      transform: scale(1.05);
    }

    .character-summary {
      padding: 30px 50px;
      background: rgba(0, 0, 0, 0.02);
      border-top: 2px solid var(--border-color);
    }

    .character-summary h3 {
      font-size: 1.3em;
      color: var(--text-color);
      margin: 0 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-color);
      font-weight: 600;
    }

    .summary-preview {
      background: var(--panel-bg-color);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 0.8em;
      line-height: 1.8;
      color: var(--text-color);
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 150px;
      max-height: 600px;
      overflow-y: auto;
    }

    .submit-section {
      margin-top: 30px;
      text-align: center;
    }

    .submit-btn {
      padding: 16px 60px;
      font-size: 1.1em;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-secondary));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 8px 20px var(--glow-color);
      font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
      letter-spacing: 1px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 12px 30px var(--glow-color);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .validation-message {
      margin-top: 15px;
      color: var(--danger-color);
      font-size: 0.9em;
      min-height: 20px;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 10px;
      }

      .creator-container {
        width: 100%;
        margin-bottom: 20px;
      }

      .creator-header {
        padding: 50px 25px 20px;
      }

      .creator-header h1 {
        font-size: 1.8em;
      }

      .creator-content,
      .character-summary {
        padding: 25px 20px;
      }

      .form-row,
      .form-row-3 {
        grid-template-columns: 1fr;
      }

      #theme-toggle {
        width: 38px;
        height: 38px;
      }

      #theme-toggle svg {
        width: 20px;
        height: 20px;
      }

      #attributes-container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .creator-header h1 {
        font-size: 1.5em;
      }

      .submit-btn {
        padding: 14px 40px;
        font-size: 1em;
      }

      .summary-preview {
        font-size: 0.75em;
        padding: 15px;
      }
    }

    /* 主题 */
    body.theme-dark {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --border-color: #333333;
      --panel-bg-color: #2a2a2a;
      --accent-color: #bb86fc;
      --body-bg-color: #121212;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --glow-color: rgba(187, 134, 252, 0.4);
    }

    body.theme-ocean {
      --bg-color: #e8f4f8;
      --text-color: #1a4d5e;
      --border-color: #b3dae6;
      --panel-bg-color: #f0f9fc;
      --accent-color: #0891b2;
      --body-bg-color: #d4ebf2;
      --shadow-color: rgba(8, 145, 178, 0.2);
      --glow-color: rgba(8, 145, 178, 0.3);
    }

    body.theme-matrix {
      --bg-color: #020d03;
      --text-color: #39ff14;
      --border-color: #0f3312;
      --panel-bg-color: #051a08;
      --accent-color: #39ff14;
      --body-bg-color: #000000;
      --shadow-color: rgba(57, 255, 20, 0.3);
      --glow-color: rgba(57, 255, 20, 0.4);
    }

    .nested-group {
      margin-left: 15px;
      padding-left: 15px;
      border-left: 3px solid var(--border-color);
    }
  </style>
</head>

<body>
  <div class="creator-container">
    <button id="theme-toggle" title="切换主题">
      <svg viewBox="0 0 24 24">
        <path
          d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z" />
      </svg>
    </button>

    <div class="theme-dropdown" id="theme-dropdown">
      <div class="theme-option active" data-theme="light">☀️ 明亮白昼</div>
      <div class="theme-option" data-theme="dark">🌙 静谧午夜</div>
      <div class="theme-option" data-theme="ocean">🌊 深海蓝调</div>
      <div class="theme-option" data-theme="matrix">💻 矩阵终端</div>
    </div>

    <div class="creator-header">
      <h1>🌫️ 神骸之城·依希利亚</h1>
      <p>Complete Free Creator - 完整自由创造模式</p>
    </div>

    <div class="creator-content">
      <form id="character-form">
        <!-- 基础信息 -->
        <div class="form-section" data-section="1">
          <h3>📋 主角 - 基础信息</h3>

          <div class="form-group">
            <label for="char-name">
              姓名 <span class="optional">(可留空，默认为 {{user}})</span>
            </label>
            <input type="text" id="char-name" class="form-input" placeholder="输入角色姓名...">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="char-gender">性别</label>
              <input type="text" id="char-gender" class="form-input" placeholder="例如: 男/女/其他" required>
            </div>

            <div class="form-group">
              <label for="char-age">年龄</label>
              <input type="number" id="char-age" class="form-input" placeholder="输入年龄..." min="1" required>
            </div>
          </div>

          <div class="form-group">
            <label>出生地</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" id="birthplace-core" name="birthplace" value="核心区" class="birthplace-radio" required>
                <label for="birthplace-core">🏛️ 核心区</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="birthplace-civilian" name="birthplace" value="平民区" class="birthplace-radio" required>
                <label for="birthplace-civilian">🌫️ 平民区</label>
              </div>
              <div class="radio-option">
                <input type="radio" id="birthplace-skeleton" name="birthplace" value="神骸区" class="birthplace-radio">
                <label for="birthplace-skeleton">💀 神骸区</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="char-location">当前所在区域</label>
            <select id="char-location" class="form-select" required>
              <option value="核心区">核心区</option>
              <option value="平民区" selected>平民区</option>
              <option value="神骸区">神骸区</option>
            </select>
          </div>
        </div>

        <!-- 基础属性 -->
        <div class="form-section" data-section="2">
          <h3>⚡ 主角 - 基础属性</h3>

          <div id="attributes-container"></div>

          <div class="form-group" style="margin-top: 20px;">
            <label>
              <input type="checkbox" id="auto-calc-derived" checked> 自动计算衍生数值
            </label>
          </div>
        </div>

        <!-- 衍生数值 -->
        <div class="form-section" data-section="3">
          <h3>💪 主角 - 衍生数值</h3>

          <div class="form-row">
            <div class="form-group">
              <label for="hp-max">生命值上限</label>
              <input type="number" id="hp-max" class="form-input" min="1" required>
            </div>
            <div class="form-group">
              <label for="hp-current">生命值当前</label>
              <input type="number" id="hp-current" class="form-input" min="0" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="armor-max">护甲值上限</label>
              <input type="number" id="armor-max" class="form-input" min="0" value="0" required>
            </div>
            <div class="form-group">
              <label for="armor-current">护甲值当前</label>
              <input type="number" id="armor-current" class="form-input" min="0" value="0" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="resistance-max">灵质抗性上限</label>
              <input type="number" id="resistance-max" class="form-input" min="0" required>
            </div>
            <div class="form-group">
              <label for="resistance-current">灵质抗性当前</label>
              <input type="number" id="resistance-current" class="form-input" min="0" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="stamina-max">体力值上限</label>
              <input type="number" id="stamina-max" class="form-input" min="1" required>
            </div>
            <div class="form-group">
              <label for="stamina-current">体力值当前</label>
              <input type="number" id="stamina-current" class="form-input" min="0" required>
            </div>
          </div>
        </div>

        <!-- 污染度 -->
        <div class="form-section" data-section="4">
          <h3>☠️ 主角 - 污染度</h3>

          <div class="form-row">
            <div class="form-group">
              <label for="pollution-current">污染度</label>
              <input type="number" id="pollution-current" class="form-input" value="0" min="0" max="100" required>
            </div>
            <div class="form-group">
              <label for="pollution-stage">污染阶段</label>
              <select id="pollution-stage" class="form-select" required>
                <option value="无污染">无污染</option>
                <option value="轻微结晶">轻微结晶</option>
                <option value="中度污染">中度污染</option>
                <option value="重度污染">重度污染</option>
                <option value="结晶化边缘">结晶化边缘</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="pollution-symptoms">可见症状 <span class="optional">(选填，多个用逗号分隔)</span></label>
            <input type="text" id="pollution-symptoms" class="form-input" placeholder="例如: 手臂有紫色晶簇,眼睛发光">
          </div>
        </div>

        <!-- 职业 -->

  <script>
    (function (window) {
      // ========== 防抖函数 ==========
      function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
          const later = () => {
            clearTimeout(timeout);
            func(...args);
          };
          clearTimeout(timeout);
          timeout = setTimeout(later, wait);
        };
      }

      // ========== 元素引用 ==========
      const themeToggle = document.getElementById('theme-toggle');
      const themeDropdown = document.getElementById('theme-dropdown');

      const charBackground = document.getElementById('char-background');

      const currencyCore = document.getElementById('currency-core');
      const currencyCivilian = document.getElementById('currency-civilian');

      const timeDate = document.getElementById('time-date');
      const timeTime = document.getElementById('time-time');

      // 角色数据
      const character = {
        name: '',
        gender: '',
        age: '',
        birthplace: '',
        location: '',
        attributes: {
          力量: 5,
          敏捷: 5,

          知识: 5,
          意志: 5,
          魅力: 5

        background: '',
        description: '',
        personality: ''
      };

      // ========== 辅助函数：安全收集NPC和敌人数据 ==========
      function collectProfessions() {
        const professions = [];
        document.querySelectorAll('#professions-container .list-item').forEach(item => {
          try {
            const profNameEl = item.querySelector('.profession-name');
            const profName = profNameEl ? profNameEl.value.trim() : '';
            if (profName) {
              professions.push({
                name: profName,
                desc: item.querySelector('.profession-desc')?.value?.trim() || ''
              });
            }
          } catch (e) {
            console.error('收集职业数据出错:', e);
          }
        });
        return professions;
      }

      function collectSkills() {
        const skills = [];
        document.querySelectorAll('#skills-container .list-item').forEach(item => {
          try {
            const skillNameEl = item.querySelector('.skill-name');
            const skillName = skillNameEl ? skillNameEl.value.trim() : '';
            if (skillName) {
              skills.push({
                name: skillName,
                type: item.querySelector('.skill-type')?.value || '主动',
                level: item.querySelector('.skill-level')?.value || '初级',
                desc: item.querySelector('.skill-desc')?.value?.trim() || '',
                cost: item.querySelector('.skill-cost')?.value?.trim() || ''
              });
            }
          } catch (e) {
            console.error('收集技能数据出错:', e);
          }
        });
        return skills;
      }

      function collectBackpack() {
        const backpack = [];
        document.querySelectorAll('#backpack-container .list-item').forEach(item => {
          try {
            const itemNameEl = item.querySelector('.item-name');
            const itemName = itemNameEl ? itemNameEl.value.trim() : '';
            if (itemName) {
              backpack.push({
                name: itemName,
                type: item.querySelector('.item-type')?.value || '杂物',
                quantity: item.querySelector('.item-quantity')?.value || 1,
                desc: item.querySelector('.item-desc')?.value?.trim() || ''
              });
            }
          } catch (e) {
            console.error('收集背包数据出错:', e);
          }
        });
        return backpack;
      }

      function collectStatuses() {
        const statuses = [];
        document.querySelectorAll('#status-container .list-item').forEach(item => {
          try {
            const statusNameEl = item.querySelector('.status-name');
            const statusName = statusNameEl ? statusNameEl.value.trim() : '';
            if (statusName) {
              statuses.push({
                name: statusName,
                type: item.querySelector('.status-type')?.value || '增益',
                level: item.querySelector('.status-level')?.value?.trim() || '',
                desc: item.querySelector('.status-desc')?.value?.trim() || ''
              });
            }
          } catch (e) {
            console.error('收集状态数据出错:', e);
          }
        });
        return statuses;
      }

      function collectNPCs() {
        const npcs = [];
        document.querySelectorAll('#npc-container .list-item').forEach(item => {
          try {
            const npcNameEl = item.querySelector('.npc-name');
            const npcName = npcNameEl ? npcNameEl.value.trim() : '';
            if (npcName) {
              npcs.push({
                name: npcName,
                profession: item.querySelector('.npc-profession')?.value?.trim() || '',
                area: item.querySelector('.npc-area')?.value || '未知',
                location: item.querySelector('.npc-location')?.value?.trim() || '',
                companion: item.querySelector('.npc-companion')?.checked || false,
                present: item.querySelector('.npc-present')?.checked || false,
                attributes: {
                  力量: item.querySelector('.npc-attr-str')?.value || 5,
                  敏捷: item.querySelector('.npc-attr-agi')?.value || 5,
                  感知: item.querySelector('.npc-attr-per')?.value || 5,
                  知识: item.querySelector('.npc-attr-int')?.value || 5,
                  意志: item.querySelector('.npc-attr-wil')?.value || 5,
                  魅力: item.querySelector('.npc-attr-cha')?.value || 5
                },
                background: item.querySelector('.npc-background')?.value?.trim() || '',
                personality: item.querySelector('.npc-personality')?.value?.trim() || '',
                appearance: item.querySelector('.npc-appearance')?.value?.trim() || '',
                title: item.querySelector('.npc-title')?.value?.trim() || '',
                affection: item.querySelector('.npc-affection')?.value || 0,
                trust: item.querySelector('.npc-trust')?.value || 0,
                pollution: item.querySelector('.npc-pollution')?.value || 0
              });
            }
          } catch (e) {
            console.error('收集NPC数据出错:', e);
          }
        });
        return npcs;
      }

      function collectEnemies() {
        const enemies = [];
        document.querySelectorAll('#enemy-container .list-item').forEach(item => {
          try {
            const enemyNameEl = item.querySelector('.enemy-name');
            const enemyName = enemyNameEl ? enemyNameEl.value.trim() : '';
            if (enemyName) {
              enemies.push({
                name: enemyName,
                type: item.querySelector('.enemy-type')?.value || '未知',
                hpMax: item.querySelector('.enemy-hp-max')?.value || 50,
                hpCurrent: item.querySelector('.enemy-hp-current')?.value || 50,
                armorMax: item.querySelector('.enemy-armor-max')?.value || 0,
                armorCurrent: item.querySelector('.enemy-armor-current')?.value || 0,
                attributes: {
                  力量: item.querySelector('.enemy-attr-str')?.value || 5,
                  敏捷: item.querySelector('.enemy-attr-agi')?.value || 5,
                  感知: item.querySelector('.enemy-attr-per')?.value || 5,
                  知识: item.querySelector('.enemy-attr-int')?.value || 5,
                  意志: item.querySelector('.enemy-attr-wil')?.value || 5,
                  魅力: item.querySelector('.enemy-attr-cha')?.value || 5
                },
                skills: item.querySelector('.enemy-skills')?.value?.trim() || '',
                weakness: item.querySelector('.enemy-weakness')?.value?.trim() || '',
                drops: item.querySelector('.enemy-drops')?.value?.trim() || '',
                notes: item.querySelector('.enemy-notes')?.value?.trim() || ''
              });
            }
          } catch (e) {
            console.error('收集敌人数据出错:', e);
          }
        });
        return enemies;
      }

      // ========== 主题切换 ==========
      themeToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        themeDropdown.classList.toggle('visible');
      });

      document.addEventListener('click', (e) => {
        if (!themeDropdown.contains(e.target) && !themeToggle.contains(e.target)) {
          themeDropdown.classList.remove('visible');
        }
      });

      themeOptions.forEach(option => {
        option.addEventListener('click', () => {
          const theme = option.dataset.theme;
          themeOptions.forEach(opt => opt.classList.remove('active'));
          option.classList.add('active');
          document.body.className = theme === 'light' ? '' : `theme-${theme}`;
          localStorage.setItem('yananCreatorTheme', theme);
          themeDropdown.classList.remove('visible');
        });
      });

      const savedTheme = localStorage.getItem('yananCreatorTheme') || 'light';
      if (savedTheme !== 'light') {
        document.body.className = `theme-${savedTheme}`;
      }
      themeOptions.forEach(opt => {
        if (opt.dataset.theme === savedTheme) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });

      // ========== 初始化属性控制器 ==========
      function initAttributesControls() {
        const attrNames = ['力量', '敏捷', '感知', '知识', '意志', '魅力'];
        attributesContainer.innerHTML = '';

        attrNames.forEach(attr => {
          const control = document.createElement('div');
          control.className = 'point-control';
          control.innerHTML = `
                        <span class="label">${attr}</span>
                        <div class="controls">
                            <button type="button" class="adjust-btn minus" data-attr="${attr}">-</button>
                            <input type="number" id="attr-${attr}" value="5" min="1" max="20" data-attr="${attr}">
                            <button type="button" class="adjust-btn plus" data-attr="${attr}">+</button>
                        </div>
                    `;
          attributesContainer.appendChild(control);
        });

        document.querySelectorAll('.adjust-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const attr = e.target.dataset.attr;
            const input = document.getElementById(`attr-${attr}`);
            const currentValue = parseInt(input.value);
            const isPlus = e.target.classList.contains('plus');

            if (isPlus && currentValue < 20) {
              input.value = currentValue + 1;
            } else if (!isPlus && currentValue > 1) {
              input.value = currentValue - 1;
            }

            character.attributes[attr] = parseInt(input.value);
            updateDerivedValues();
            debouncedUpdateSummary();
          });
        });

        document.querySelectorAll('.point-control input').forEach(input => {
          input.addEventListener('input', (e) => {
            const attr = e.target.dataset.attr;
            let value = parseInt(e.target.value) || 1;
            value = Math.max(1, Math.min(20, value));
            e.target.value = value;
            character.attributes[attr] = value;
            updateDerivedValues();
            debouncedUpdateSummary();
          });
        });
      }

      // ========== 自动计算衍生数值 ==========
      function updateDerivedValues() {
        if (!autoCalcDerived.checked) return;

        const birthplace = document.querySelector('.birthplace-radio:checked')?.value;

        const hp = 10 + (character.attributes.力量 * 5) + (character.attributes.意志 * 2);
        hpMax.value = hp;
        hpCurrent.value = hp;

        const stamina = 5 + character.attributes.敏捷 + character.attributes.力量;
        staminaMax.value = stamina;
        staminaCurrent.value = stamina;

        const resistance = birthplace === '核心区' ? 20 : 0;
        resistanceMax.value = resistance;
        resistanceCurrent.value = resistance;

        if (birthplace) {
          pollutionCurrent.value = birthplace === '核心区' ? 0 : 5;
          pollutionStage.value = birthplace === '核心区' ? '无污染' : '轻微结晶';
        }
      }

      autoCalcDerived.addEventListener('change', () => {
        if (autoCalcDerived.checked) {
          updateDerivedValues();
        }
      });

      birthplaceInputs.forEach(radio => {
        radio.addEventListener('change', updateDerivedValues);
      });

      // ========== 动态列表管理 ==========
      let professionCounter = 0;
      window.addProfession = function () {
        professionCounter++;
        const container = document.getElementById('professions-container');
        const item = document.createElement('div');
        item.className = 'list-item';
        item.dataset.id = professionCounter;
    item.innerHTML = `
          <div class="list-item-header">
            <span class="list-item-title">职业 #${professionCounter}</span>
            <button type="button" class="remove-item-btn" data-remove-type="profession">删除</button>
          </div>
                    <div class="form-group">
                        <label>职业名称</label>
                        <input type="text" class="form-input profession-name" placeholder="例如: 猎人" required>
                    </div>
                    <div class="form-group">
                        <label>职业描述 <span class="optional">(选填)</span></label>
                        <textarea class="form-textarea profession-desc" placeholder="描述职业特点..."></textarea>
                    </div>
                `;
        container.appendChild(item);
        debouncedUpdateSummary();
      };

      let skillCounter = 0;
      window.addSkill = function () {
        skillCounter++;
        const container = document.getElementById('skills-container');
        const item = document.createElement('div');
        item.className = 'list-item';
        item.dataset.id = skillCounter;
    item.innerHTML = `
          <div class="list-item-header">
            <span class="list-item-title">技能 #${skillCounter}</span>
            <button type="button" class="remove-item-btn" data-remove-type="skill">删除</button>
          </div>
                    <div class="form-group">
                        <label>技能名称</label>
                        <input type="text" class="form-input skill-name" placeholder="例如: 剑术精通" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>技能类型</label>

                    </div>
                    <div class="form-group">
                        <label>消耗 <span class="optional">(选填)</span></label>

                `;
        container.appendChild(item);

      };

      let backpackCounter = 0;
      window.addBackpackItem = function () {
        backpackCounter++;
        const container = document.getElementById('backpack-container');

        item.className = 'list-item';
        item.dataset.id = backpackCounter;
    item.innerHTML = `

                        <textarea class="form-textarea item-desc" placeholder="描述物品的效果和特性..."></textarea>
                    </div>
                `;
        container.appendChild(item);
        debouncedUpdateSummary();
      };

          if (action === 'add-profession') return window.addProfession();
          if (action === 'add-skill') return window.addSkill();

          if (action === 'add-enemy') return window.addEnemy();

                alert('⚠️ 无法自动复制，命令已输出到控制台。\n\n请按F12打开控制台查看完整命令。');
                submitBtn.textContent = '⚠️ 请查看控制台';
                submitBtn.style.background = 'linear-gradient(135deg, #ffc107, #ff9800)';
                validationMsg.textContent = '⚠️ 命令已输出到控制台(F12查看)';
                validationMsg.style.color = 'var(--warning-color)';
              }
            }
          }

        } catch (error) {
          console.error('❌ 创建失败:', error);
          submitBtn.textContent = '❌ 创建失败';
          submitBtn.style.background = 'linear-gradient(135deg, #dc3545, #c82333)';
          validationMsg.textContent = '❌ 创建失败，请检查浏览器控制台';
          validationMsg.style.color = 'var(--danger-color)';
        } finally {
          // 3秒后恢复按钮状态
          setTimeout(() => {
            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 确认创建并开始冒险';
            submitBtn.style.background = '';
          }, 3000);
        }
      });

      // 初始化
      initAttributesControls();
      debouncedUpdateSummary();

    })(window);
  </script>
</body>

</html>
