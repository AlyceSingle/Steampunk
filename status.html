<!DOCTYPE html>
<!-- Single出品,仅在类脑旅程发布 -->
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>状态栏界面 - Character Status</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://unpkg.com">
    <link href="https://unpkg.com/@fontsource/noto-sans-sc@5.0.0/400.css" rel="stylesheet">

    <style>
        /* ═══════════════════ ROOT VARIABLES ═══════════════════ */
        :root {
            --bg-abyss: #060a13;
            --bg-deep: #0d1117;
            --bg-panel: rgba(13, 17, 23, 0.92);
            --bg-card: rgba(22, 27, 38, 0.88);
            --bg-card-hover: rgba(30, 38, 52, 0.95);
            --bg-glass: rgba(17, 24, 39, 0.55);
            --gold: #d4a24e;
            --gold-bright: #f0c96e;
            --gold-dim: rgba(212, 162, 78, 0.18);
            --gold-glow: rgba(212, 162, 78, 0.35);
            --cyan: #00d4ff;
            --cyan-dim: rgba(0, 212, 255, 0.12);
            --cyan-glow: rgba(0, 212, 255, 0.35);
            --red: #ff4757;
            --red-dim: rgba(255, 71, 87, 0.12);
            --red-glow: rgba(255, 71, 87, 0.35);
            --green: #2ed573;
            --green-dim: rgba(46, 213, 115, 0.12);
            --green-glow: rgba(46, 213, 115, 0.35);
            --blue: #3b82f6;
            --purple: #a855f7;
            --orange: #ff8c00;
            --text-color: #e2ddd4;
            --text-secondary: #9e9585;
            --text-muted: #6b6352;
            --accent-color: var(--gold);
            --positive-color: var(--green);
            --negative-color: var(--red);
            --border-color: rgba(212, 162, 78, 0.15);
            --font-display: 'Cinzel', 'Noto Sans SC', serif;
            --font-body: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }

        /* ═══════════════════ GLOBAL RESET ═══════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-abyss);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Particle starfield background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1.2px 1.2px at 15% 25%, rgba(212, 162, 78, 0.5), transparent),
                radial-gradient(1px 1px at 55% 65%, rgba(0, 212, 255, 0.35), transparent),
                radial-gradient(1.5px 1.5px at 80% 15%, rgba(212, 162, 78, 0.4), transparent),
                radial-gradient(0.8px 0.8px at 35% 85%, rgba(0, 212, 255, 0.25), transparent),
                radial-gradient(1px 1px at 90% 50%, rgba(46, 213, 115, 0.2), transparent),
                radial-gradient(1.3px 1.3px at 5% 70%, rgba(212, 162, 78, 0.35), transparent);
            background-size: 220px 220px, 300px 300px, 280px 280px, 350px 350px, 250px 250px, 320px 320px;
            animation: stardrift 80s linear infinite;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        @keyframes stardrift {
            0% {
                transform: translateY(0) translateX(0);
            }

            100% {
                transform: translateY(-220px) translateX(-50px);
            }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-abyss);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        /* ═══════════════════ TAB NAVIGATION ═══════════════════ */
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 8px;
            min-height: 100vh;
        }

        .tab-nav {
            display: flex;
            gap: 2px;
            padding: 6px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-wrap: wrap;
        }

        .tab-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tab-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .tab-btn:hover {
            color: var(--gold-bright);
            background: var(--gold-dim);
            border-color: var(--border-color);
        }

        .tab-btn.active {
            color: var(--gold-bright);
            background: linear-gradient(135deg, rgba(212, 162, 78, 0.15), rgba(212, 162, 78, 0.05));
            border-color: var(--gold);
            box-shadow: 0 0 12px var(--gold-glow), inset 0 0 12px rgba(212, 162, 78, 0.05);
            text-shadow: 0 0 8px var(--gold-glow);
        }

        .tab-content {
            position: relative;
        }

        .tab-panel {
            display: none;
            animation: panelFadeIn 0.35s ease;
        }

        .tab-panel.active {
            display: block;
        }

        @keyframes panelFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-header {
            padding: 16px 20px 12px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        .panel-header h2 {
            font-family: var(--font-display);
            font-size: 1.3em;
            color: var(--gold-bright);
            text-shadow: 0 0 20px var(--gold-glow);
            letter-spacing: 2px;
        }

        /* ═══════════════════ SECTION CARDS (glassmorphism) ═══════════════════ */
        .section-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* ═══════════════════ STATS GRID ═══════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        /* ═══════════════════ STAT BOX — Game-style card ═══════════════════ */
        .stat-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--gold);
            border-radius: 8px;
            padding: 12px 14px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 162, 78, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        .stat-box:hover {
            background: var(--bg-card-hover);
            border-color: var(--gold);
            box-shadow: 0 0 16px rgba(212, 162, 78, 0.1), inset 0 0 20px rgba(212, 162, 78, 0.03);
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 0.8em;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            font-family: var(--font-display);
        }

        .stat-value {
            font-size: 1em;
            font-weight: 500;
            color: var(--text-color);
        }

        /* ═══════════════════ PROGRESS BAR — Game HP/SP style ═══════════════════ */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .progress-bar {
            flex: 1;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* Notch marks on bar */
        .progress-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent,
                    transparent 19%,
                    rgba(0, 0, 0, 0.25) 19%,
                    rgba(0, 0, 0, 0.25) 20%);
            pointer-events: none;
            z-index: 2;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            background: linear-gradient(180deg, #ff6b6b 0%, #ee2d2d 40%, #cc1515 100%);
            box-shadow: 0 0 10px var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
            animation: barPulse 2s ease-in-out infinite;
        }

        /* Shine effect on fill */
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            border-radius: 3px 3px 0 0;
        }

        .progress-fill.positive {
            background: linear-gradient(180deg, #5dff8f 0%, #2ed573 40%, #1ab55a 100%);
            box-shadow: 0 0 10px var(--green-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.negative {
            background: linear-gradient(180deg, #ff7979 0%, #ff4757 40%, #d63031 100%);
            box-shadow: 0 0 10px var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        @keyframes barPulse {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.08);
            }
        }

        .progress-text {
            font-size: 0.8em;
            font-weight: 700;
            color: var(--text-color);
            min-width: 65px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* Bar color variants */
        .progress-fill.bar-hp {
            background: linear-gradient(180deg, #ff6b6b 0%, #ee2d2d 40%, #cc1515 100%);
            box-shadow: 0 0 12px var(--red-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.bar-armor {
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 40%, #2563eb 100%);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.bar-sp {
            background: linear-gradient(180deg, #5dff8f 0%, #2ed573 40%, #1ab55a 100%);
            box-shadow: 0 0 12px var(--green-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.bar-xp {
            background: linear-gradient(180deg, #c084fc 0%, #a855f7 40%, #7c3aed 100%);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.bar-gold {
            background: linear-gradient(180deg, #f0c96e 0%, #d4a24e 40%, #b8860b 100%);
            box-shadow: 0 0 12px var(--gold-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        .progress-fill.bar-fame {
            background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 40%, #d97706 100%);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }

        /* Radar chart */
        .radar-chart-wrap {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .radar-chart-wrap svg {
            max-width: 280px;
            width: 100%;
        }

        /* ═══════════════════ ITEM CARDS ═══════════════════ */
        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .item-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(212, 162, 78, 0.1);
        }

        .item-card.collapsed .item-details {
            display: none;
        }

        .item-card .item-details {
            padding: 10px 14px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.15);
            animation: panelFadeIn 0.25s ease;
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            min-height: 42px;
        }

        .item-name {
            font-weight: 600;
            color: var(--text-color);
            flex: 1;
        }

        .item-tier {
            font-size: 0.72em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 8px var(--gold-glow);
        }

        .item-detail-row {
            display: flex;
            gap: 10px;
            padding: 4px 0;
            font-size: 0.88em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .item-detail-label {
            font-weight: 600;
            color: var(--gold);
            min-width: 55px;
            flex-shrink: 0;
        }

        .item-detail-value {
            color: var(--text-color);
            flex: 1;
            line-height: 1.5;
        }

        .item-attr-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 4px 0 4px 55px;
        }

        .item-attr-tag {
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--cyan-dim);
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .equip-slot {
            border-left: 3px solid var(--purple);
        }

        /* ═══════════════════ RELATIONSHIP / NPC CARDS ═══════════════════ */
        .relationship-card,
        .enemy-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }

        .relationship-card:hover,
        .enemy-card:hover {
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(212, 162, 78, 0.08);
            transform: translateY(-2px);
        }

        .relationship-card .relationship-details {
            display: none;
        }

        .relationship-card.expanded .relationship-details {
            display: block;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
            animation: panelFadeIn 0.3s ease;
        }

        .enemy-card {
            border-left: 3px solid var(--red);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .card-name {
            font-family: var(--font-display);
            font-size: 1.15em;
            font-weight: 600;
            color: var(--gold-bright);
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .card-header-actions {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .card-badge {
            font-size: 0.72em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        /* ═══════════════════ TASK CARDS ═══════════════════ */
        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--blue);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .task-card:hover {
            border-color: var(--gold);
            box-shadow: 0 0 12px rgba(212, 162, 78, 0.1);
        }

        .task-title {
            font-family: var(--font-display);
            font-size: 1.05em;
            font-weight: 600;
            color: var(--gold-bright);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .task-risk {
            font-size: 0.7em;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            color: #fff;
            letter-spacing: 1px;
        }

        .risk-s {
            background: linear-gradient(135deg, #ff0040, #ff4500);
            box-shadow: 0 0 10px rgba(255, 0, 64, 0.4);
        }

        .risk-a {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            box-shadow: 0 0 10px rgba(255, 69, 0, 0.3);
        }

        .risk-b {
            background: linear-gradient(135deg, #ffa502, #ffc107);
            color: #1a1a2e;
        }

        .risk-c {
            background: linear-gradient(135deg, #2ed573, #1abc9c);
        }

        .risk-d {
            background: linear-gradient(135deg, #6c757d, #8e99a4);
        }

        .task-info-row,
        .task-description {
            font-size: 0.88em;
            padding: 4px 0;
            color: var(--text-secondary);
        }

        .task-info-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 8px;
        }

        .task-info-value {
            color: var(--text-color);
        }

        .task-description {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border-color);
            line-height: 1.6;
            color: var(--text-color);
        }

        /* ═══════════════════ NEWS CARDS ═══════════════════ */
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--cyan);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .news-card:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-dim);
        }

        .news-source {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--cyan);
            font-size: 0.95em;
        }

        .news-content {
            font-size: 0.9em;
            color: var(--text-color);
            line-height: 1.6;
            margin-top: 6px;
        }

        /* ═══════════════════ LAW CARDS ═══════════════════ */
        .law-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--purple);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .law-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .law-name {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--gold-bright);
            flex: 1;
        }

        .law-status {
            font-size: 0.78em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            background: var(--purple);
            color: #fff;
        }

        .law-info-row {
            font-size: 0.88em;
            padding: 4px 0;
        }

        .law-info-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 8px;
        }

        .law-info-value {
            color: var(--text-color);
        }

        .law-options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 0;
        }

        .law-option-tag {
            font-size: 0.8em;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(168, 85, 247, 0.12);
            color: var(--purple);
            border: 1px solid rgba(168, 85, 247, 0.25);
        }

        /* ═══════════════════ PROPERTY CARDS ═══════════════════ */
        .property-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--orange);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .property-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .property-name {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--gold-bright);
            flex: 1;
        }

        .property-type {
            font-size: 0.78em;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            background: var(--orange);
            color: #fff;
        }

        .property-info-row {
            font-size: 0.88em;
            padding: 4px 0;
        }

        .property-info-label {
            font-weight: 600;
            color: var(--gold);
            margin-right: 8px;
        }

        .property-info-value {
            color: var(--text-color);
        }

        .property-facilities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 0;
        }

        .facility-tag {
            font-size: 0.8em;
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(255, 140, 0, 0.12);
            color: var(--orange);
            border: 1px solid rgba(255, 140, 0, 0.25);
        }

        /* ═══════════════════ WATCH CARDS ═══════════════════ */
        .watch-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 3px solid #ff69b4;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .watch-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .watch-name {
            font-family: var(--font-display);
            font-weight: 600;
            color: var(--gold-bright);
            font-size: 1.05em;
        }

        .watch-section {
            margin-top: 8px;
        }

        .watch-section-title {
            font-weight: 600;
            font-size: 0.85em;
            color: var(--gold);
            margin-bottom: 4px;
        }

        .watch-section-content {
            font-size: 0.88em;
            color: var(--text-color);
            line-height: 1.5;
            padding-left: 10px;
            border-left: 2px solid rgba(255, 105, 180, 0.3);
        }

        /* ═══════════════════ BUTTONS ═══════════════════ */
        .delete-btn {
            font-family: var(--font-body);
            font-size: 0.75em;
            font-weight: 600;
            padding: 3px 10px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 71, 87, 0.75);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .delete-btn:hover {
            background: var(--red);
            box-shadow: 0 0 10px var(--red-glow);
            transform: translateY(-1px);
        }

        /* ═══════════════════ DIVIDERS & MISC ═══════════════════ */
        .thin-divider,
        hr.thin-divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            margin: 16px 0;
        }

        h4 {
            font-family: var(--font-display);
            font-size: 1em;
            letter-spacing: 0.5px;
        }

        /* ═══════════════════ ACCORDION FALLBACK (details/summary) ═══════════════════ */
        details.section {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 8px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        details.section[data-toggle],
        details.section>summary,
        details.section>[data-toggle] {
            padding: 12px 16px;
            font-family: var(--font-display);
            font-size: 1em;
            font-weight: 600;
            color: var(--gold-bright);
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        details.section>summary::-webkit-details-marker {
            display: none;
        }

        details.section>[data-toggle]::before {
            content: '▸';
            margin-right: 10px;
            transition: transform 0.3s;
            color: var(--gold);
        }

        details.section[open]>[data-toggle]::before {
            transform: rotate(90deg);
        }

        details.section>[data-toggle]:hover {
            background: var(--gold-dim);
        }

        .section-content {
            padding: 0 16px 16px;
        }

        /* ═══════════════════ RESPONSIVE ═══════════════════ */
        @media (max-width: 600px) {
            .page-wrapper {
                padding: 4px;
            }

            .tab-btn span {
                display: none;
            }

            .tab-btn {
                padding: 8px;
            }

            .tab-btn svg {
                width: 20px;
                height: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .panel-header h2 {
                font-size: 1.1em;
            }
        }

        @media (min-width: 601px) and (max-width: 800px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>

</head>

    <script>
        async function waitGlobalInitialized(varName) {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (typeof window[varName] !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
            });
        }

        const StatusManager = {
            mvuData: null,

            async initialize() {
                try {
                    await waitGlobalInitialized('Mvu');

                    if (typeof Mvu === 'undefined' || typeof Mvu.getMvuData !== 'function') {
                        this.showError('MVU API 未找到');
                        return;
                    }

                    console.log('开始加载 MVU 数据...');
                    await this.loadData();

                    if (!this.mvuData) {
                        this.showError('MVU 数据为空');
                        return;
                    }

                    console.log('✅ MVU 数据加载成功');
                    this.cacheCommonData();
                    this.renderStatus();
                } catch (error) {
                    console.error('❌ 初始化失败:', error);
                    this.showError('初始化失败: ' + error.message);
                }
            },

            cacheCommonData() {
                this._cache = {
                    userName: this.SafeGetValue('主角.姓名', '未命名'),
                    character: {
                        name: this.SafeGetValue('主角.姓名', '未命名'),
                        area: this.SafeGetValue('主角.所在区域', '未知区域'),
                        profession: String(this.SafeGetValue('主角.职业', '无职业')).replace(/\s*(?:Lv\.?|等级)\s*\d+/i, ''),
                        fame: this.SafeGetValue('主角.知名度', 0),
                        reputation: this.SafeGetValue('主角.风评度', 0)
                    }
                };
            },

            async loadData() {
                try {
                    this.mvuData = await Mvu.getMvuData({ type: 'message', message_id: 'latest' });
                    console.log('MVU 原始数据:', this.mvuData);
                } catch (error) {
                    console.error('加载失败:', error);
                    throw error;
                }
            },

            // 立即从 getVariables 同步最新变量（绕过 Mvu 缓存），然后直接调用渲染函数
            // 用于替代 loadData().then(render)，确保手动编辑后 UI 立刻更新
            refreshAndRender(renderFn) {
                try {
                    if (typeof getVariables === 'function' && this.mvuData) {
                        const latestVars = getVariables({ type: 'message', message_id: 'latest' });
                        if (latestVars) {
                            // 深度合并而非直接替换，保留 initialized_lorebooks 等 MVU 元数据
                            // 同时确保新增的键（如新技能）能被写入 stat_data
                            _.merge(this.mvuData, latestVars);
                        }
                    }
                } catch (e) {
                    console.warn('[refreshAndRender] 同步变量失败，使用缓存数据:', e);
                }
                this.cacheCommonData();
                renderFn.call(this);
            },

            SafeGetValue(path, defaultValue) {
                if (defaultValue === undefined) defaultValue = null;

                // 检查 mvuData 是否已加载
                if (!this.mvuData) {
                    console.warn('SafeGetValue: mvuData 未加载');
                    return defaultValue;
                }

                try {
                    // 传入 this.mvuData 而不是 null
                    const value = Mvu.getMvuVariable(this.mvuData, path, { default_value: defaultValue });

                    // 处理返回值
                    if (value === null || value === undefined) {
                        return defaultValue;
                    }

                    // 如果是数组且第一个元素不是扩展标记,返回第一个元素
                    if (Array.isArray(value) && value.length > 0 && value[0] !== '$__META_EXTENSIBLE__$') {
                        return value[0];
                    }

                    // 如果是字符串 "null",返回默认值
                    if (value === 'null' || value === '"null"') {
                        return defaultValue;
                    }

                    return value;
                } catch (error) {
                    console.warn('获取路径失败: ' + path, error);
                    return defaultValue;
                }
            },

            showError(message) {
                const errorHTML = '<div style="padding: 20px; text-align: center; color: var(--negative-color);">⚠️ ' + message + '</div>';
                ['character-info-content', 'inventory-content', 'world-info-content', 'relationship-content', 'enemy-content', 'task-content', 'property-content', 'news-content', 'laws-content', 'watch-list-content'].forEach(function (id) {
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = errorHTML;
                });
            },

            createProgressBar(current, max, options) {
                if (!options) options = {};
                const allowNegative = options.allowNegative || false;
                const showPercentage = options.showPercentage || false;
                const isDecimal = options.isDecimal || false;
                const barType = options.barType || '';

                let percentage = 0;
                let displayValue = current;
                let cssClass = barType ? 'bar-' + barType : '';

                if (allowNegative) {
                    const normalized = Math.max(-100, Math.min(100, current));
                    percentage = ((normalized + 100) / 200) * 100;
                    displayValue = normalized;
                    cssClass = normalized < 0 ? 'negative' : (normalized > 0 ? 'positive' : '');
                } else {
                    percentage = max > 0 ? (current / max) * 100 : 0;
                }

                const formatValue = isDecimal && !Number.isInteger(displayValue) ? displayValue.toFixed(1) : String(displayValue);
                const displayText = showPercentage ? formatValue : (isDecimal && !Number.isInteger(current) ? current.toFixed(1) : String(current)) + ' / ' + (isDecimal && !Number.isInteger(max) ? max.toFixed(1) : String(max));

                return '<div class="progress-container"><div class="progress-bar"><div class="progress-fill ' + cssClass + '" style="width: ' + Math.max(0, Math.min(100, percentage)).toFixed(1) + '%"></div></div><div class="progress-text">' + displayText + '</div></div>';
            },

            // SVG Radar Chart for 6 base attributes
            createRadarChart(attrValues) {
                var labels = ['力量', '敏捷', '感知', '知识', '意志', '魅力'];
                var n = 6;
                var cx = 140, cy = 140, r = 110;
                var angleStep = (Math.PI * 2) / n;
                var startAngle = -Math.PI / 2;
                // Build grid lines (3 levels)
                var gridSvg = '';
                [0.33, 0.66, 1.0].forEach(function (scale) {
                    var pts = [];
                    for (var i = 0; i < n; i++) {
                        var a = startAngle + i * angleStep;
                        pts.push((cx + r * scale * Math.cos(a)).toFixed(1) + ',' + (cy + r * scale * Math.sin(a)).toFixed(1));
                    }
                    gridSvg += '<polygon points="' + pts.join(' ') + '" fill="none" stroke="rgba(212,162,78,0.15)" stroke-width="1"/>';
                });
                // Axis lines
                for (var i = 0; i < n; i++) {
                    var a = startAngle + i * angleStep;
                    gridSvg += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + r * Math.cos(a)).toFixed(1) + '" y2="' + (cy + r * Math.sin(a)).toFixed(1) + '" stroke="rgba(212,162,78,0.12)" stroke-width="1"/>';
                }
                // Data polygon
                var maxVal = 20;
                var dataPts = [];
                for (var i = 0; i < n; i++) {
                    var val = Math.min(attrValues[i] || 0, maxVal);
                    var scale = val / maxVal;
                    var a = startAngle + i * angleStep;
                    dataPts.push((cx + r * scale * Math.cos(a)).toFixed(1) + ',' + (cy + r * scale * Math.sin(a)).toFixed(1));
                }
                var dataFill = '<polygon points="' + dataPts.join(' ') + '" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="2"/>';
                // Data dots + labels
                var dotsSvg = '';
                for (var i = 0; i < n; i++) {
                    var val = Math.min(attrValues[i] || 0, maxVal);
                    var scale = val / maxVal;
                    var a = startAngle + i * angleStep;
                    var dx = cx + r * scale * Math.cos(a);
                    var dy = cy + r * scale * Math.sin(a);
                    dotsSvg += '<circle cx="' + dx.toFixed(1) + '" cy="' + dy.toFixed(1) + '" r="4" fill="#00d4ff" stroke="#fff" stroke-width="1"/>';
                    // Labels
                    var lx = cx + (r + 22) * Math.cos(a);
                    var ly = cy + (r + 22) * Math.sin(a);
                    var anchor = Math.abs(Math.cos(a)) < 0.1 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end');
                    dotsSvg += '<text x="' + lx.toFixed(1) + '" y="' + (ly + 4).toFixed(1) + '" fill="#d4a24e" font-size="11" font-family="Cinzel, Noto Sans SC" text-anchor="' + anchor + '" font-weight="600">' + labels[i] + ' ' + (attrValues[i] || 0) + '</text>';
                }
                return '<div class="radar-chart-wrap"><svg viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">' + gridSvg + dataFill + dotsSvg + '</svg></div>';
            },

            renderCharacterInfo() {
                const content = document.getElementById('character-info-content');
                if (!content) return;

                try {
                    const cache = this._cache.character;
                    const name = cache.name;
                    const area = cache.area;

                    // 货币数据格式: 直接数值
                    const coreCurrency = this.SafeGetValue('主角.背包.货币.精制币', 0);
                    const civilCurrency = this.SafeGetValue('主角.背包.货币.劳工券', 0);

                    const attrs = ['力量', '敏捷', '感知', '知识', '意志', '魅力'];
                    const self = this;
                    const attrHTML = attrs.map(function (attr) {
                        const current = self.SafeGetValue('主角.基础属性.' + attr + '.cur', 0);
                        const max = self.SafeGetValue('主角.基础属性.' + attr + '.max', 20);
                        const total = self.SafeGetValue('主角.总属性.' + attr, current);
                        return '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">' + attr + '</div><div style="display: flex; gap: 4px; align-items: center;"><button class="delete-btn" onclick="StatusManager.spendAttrPoint(event, \'' + attr + '\')" title="消耗1属性点提升' + attr + '" style="padding: 2px 6px; font-size: 0.7em; background: var(--positive-color);">+</button><button class="delete-btn" onclick="StatusManager.editAttribute(event, \'' + attr + '\', ' + current + ', ' + max + ')" title="修改' + attr + '属性" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️ 编辑</button></div></div><div class="stat-value">基础: ' + current + '/' + max + ' | 总计: ' + total + '</div></div>';
                    }).join('');

                    // 获取当前状态
                    const currentStatus = this.SafeGetValue('主角.当前状态', {});
                    let statusHTML = '';
                    if (currentStatus && typeof currentStatus === 'object' && Object.keys(currentStatus).length > 0) {
                        const statusItems = Object.keys(currentStatus).map(function (statusName) {
                            const status = currentStatus[statusName];
                            if (!status || typeof status !== 'object') return '';

                            const statusType = status.类型 || '未知';
                            const statusLevel = status.等级 || '';
                            const statusDesc = status.描述 || '';
                            const statusColor = statusType === '负面状态' ? 'var(--negative-color)' : (statusType === '正面状态' ? 'var(--positive-color)' : 'var(--accent-color)');

                            let attrChanges = '';

nd: var(--accent-color);">✏️</button></div>' + this.createProgressBar(armor, armorMax, { barType: 'armor' }) + '</div><div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">⚡ 体力值</div><button class="delete-btn" onclick="StatusManager.editVitalStat(event, \'体力值\', ' + sp + ', ' + spMax + ')" title="修改体力值" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div>' + this.createProgressBar(sp, spMax, { barType: 'sp' }) + '</div></div>' + statusHTML + '<hr class="thin-divider"><h4 style="color: var(--accent-color); margin-bottom: 15px;">📊 基础属性</h4>' + this.createRadarChart([this.SafeGetValue('主角.总属性.力量', 0), this.SafeGetValue('主角.总属性.敏捷', 0), this.SafeGetValue('主角.总属性.感知', 0), this.SafeGetValue('主角.总属性.知识', 0), this.SafeGetValue('主角.总属性.意志', 0), this.SafeGetValue('主角.总属性.魅力', 0)]) + '<div class="item-card collapsed" onclick="StatusManager.toggleItemCard(this)" style="cursor: pointer;"><div class="item-header"><h4 style="color: var(--accent-color); margin: 0;">属性详情 (点击展开)</h4></div><div class="item-details"><div class="stats-grid">' + attrHTML + '</div></div></div>'

            renderInventory() {

                    const data = entry[1];
                    const displayName = (data && (data.名字 || data.name)) || name;
                    const tier = (data && (data.品级 || data.tier)) || '';
                    const tierBadge = tier ? '<span class="item-tier">' + tier + '</span>' : '';
                    const itemId = sectionId + '-' + index;

                    // 构建删除按钮
                    let deleteBtn = '';
                    let equipBtn = '';

                        const fullPath = pathPrefix + '.' + name;

                    // 构建详细信息
                    let detailsHtml = '<div class="item-details">';

                    // 描述
                    if (data && (data.描述 || data.description)) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">描述</span><span class="item-detail-value">' + (data.描述 || data.description) + '</span></div>';

                    // 类型
                    if (data && (data.类型 || data.type)) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">类型</span><span class="item-detail-value">' + (data.类型 || data.type) + '</span></div>';
                    }

                    // 持握方式
                    if (data && data.持握) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">持握</span><span class="item-detail-value">' + data.持握 + '</span></div>';
                    }

                    // 数量
                    if (data && (data.数量 || data.quantity)) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">数量</span><span class="item-detail-value">' + (data.数量 || data.quantity) + '</span></div>';
                    }

                    // 伤害
                    if (data && data.伤害 !== undefined && data.伤害 > 0) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">伤害</span><span class="item-detail-value">' + data.伤害 + '</span></div>';
                    }

                    // 护甲值
                    if (data && data.护甲值 !== undefined && data.护甲值 > 0) {
                        detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">护甲</span><span class="item-detail-value">' + data.护甲值 + '</span></div>';
                    }

                    // 属性加值
                    if (data && data.属性加值 && typeof data.属性加值 === 'object') {
                        const attrEntries = Object.entries(data.属性加值).filter(function (e) { return e[0] !== '$meta'; });
                        if (attrEntries.length > 0) {
                            detailsHtml += '<div class="item-detail-row"><span class="item-detail-label">属性</span></div>';
                            detailsHtml += '<div class="item-attr-grid">';
                            attrEntries.forEach(function (attrEntry) {
                                const attrName = attrEntry[0];
                                const attrVal = attrEntry[1];
                                const sign = attrVal > 0 ? '+' : '';
                                detailsHtml += '<span class="item-attr-tag">' + attrName + ' ' + sign + attrVal + '</span>';
                            });
                            detailsHtml += '</div>';
                        }
                    }

                    // 特殊效果
                    if (data && data.特殊效果 && typeof data.特殊效果 === 'object') {
                        const effectEntries = Object.entries(data.特殊效果).filter(function (e) { return e[0] !== '$meta'; });
                        if (effectEntries.length > 0) {

                                affection = data.好感度;

                        const hpMax = (data.生命值 && data.生命值.max) !== undefined ? data.生命值.max : 0;

                        }).join('');
                        detailsHtml += '<h4 style="color: var(--accent-color); margin-bottom: 10px; font-size: 0.95em;">📊 属性概览</h4><div class="stats-grid" style="grid-template-columns: repeat(3, 1fr); gap: 10px;">' + attrHtml + '</div>';

                        // 装备

                        detailsHtml += '<h4 style="color: var(--accent-color); margin: 15px 0 10px; font-size: 0.95em;">⚔️ 当前装备</h4><div class="stats-grid" style="gap: 10px;">';

                        detailsHtml += '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">副手</div><button class="delete-btn" onclick="StatusManager.editNPCEquipment(event, \'' + name.replace(/'/g, "\\\'") + '\', \'副手\', \'' + displayEquip(equip.副手).replace(/'/g, "\\\'") + '\')" title="修改副手" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div><div class="stat-value" style="font-size: 0.85em;">' + displayEquip(equip.副手) + '</div></div>';
                        detailsHtml += '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">饰品</div><button class="delete-btn" onclick="StatusManager.editNPCEquipment(event, \'' + name.replace(/'/g, "\\\'") + '\', \'饰品\', \'' + displayEquip(equip.饰品).replace(/'/g, "\\\'") + '\')" title="修改饰品" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div><div class="stat-value" style="font-size: 0.85em;">' + displayEquip(equip.饰品) + '</div></div>';
                        if (equip.防具 && typeof equip.防具 === 'object') {
                            detailsHtml += '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">头部</div><button class="delete-btn" onclick="StatusManager.editNPCEquipment(event, \'' + name.replace(/'/g, "\\\'") + '\', \'防具.头部\', \'' + displayEquip(equip.防具.头部).replace(/'/g, "\\\'") + '\')" title="修改头部" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div><div class="stat-value" style="font-size: 0.85em;">' + displayEquip(equip.防具.头部) + '</div></div>';
                            detailsHtml += '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">身体</div><button class="delete-btn" onclick="StatusManager.editNPCEquipment(event, \'' + name.replace(/'/g, "\\\'") + '\', \'防具.身体\', \'' + displayEquip(equip.防具.身体).replace(/'/g, "\\\'") + '\')" title="修改身体" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div><div class="stat-value" style="font-size: 0.85em;">' + displayEquip(equip.防具.身体) + '</div></div>';
                            detailsHtml += '<div class="stat-box" style="position: relative;"><div style="display: flex; justify-content: space-between; align-items: center;"><div class="stat-label">手部</div><button class="delete-btn" onclick="StatusManager.editNPCEquipment(event, \'' + name.replace(/'/g, "\\\'") + '\', \'防具.手部\', \'' + displayEquip(equip.防具.手部).replace(/'/g, "\\\'") + '\')" title="修改手部" style="padding: 2px 6px; font-size: 0.7em; background: var(--accent-color);">✏️</button></div><div class="stat-value" style="font-size: 0.85em;">' + displayEquip(equip.防具.手部) + '</div></div>';

                        detailsHtml += '</div>';

                        // 当前状态
                        const npcStatus = data.当前状态 || {};

                            const npcStatusEntries = Object.entries(npcStatus).filter(function (e) { return e[0] !== '$meta'; });
                            if (npcStatusEntries.length > 0) {
                                detailsHtml += '<h4 style="color: var(--accent-color); margin: 15px 0 10px; font-size: 0.95em;">当前状态</h4>';
                                detailsHtml += '<div class="stats-grid" style="gap: 10px;">';

                                    const statusDesc = status.描述 || '';
                                    const statusColor = statusType === '负面状态' ? 'var(--negative-color)' : (statusType === '正面状态' || statusType === '增益' ? 'var(--positive-color)' : 'var(--accent-color)');

                                detailsHtml += '<div style="margin-bottom:4px;"><strong>静态性格:</strong> ' + fixedTags.join(', ') + '</div>';

            async handleEquip(event, listName, itemKey, itemName) {
                event.stopPropagation();

                try {
                    if (typeof updateVariablesWith !== 'function' || typeof _ === 'undefined') {
                        throw new Error('updateVariablesWith 或 lodash 未找到');
                    }

                    const itemData = this.SafeGetValue('主角.背包.' + listName + '.' + itemKey, null);
                    if (!itemData) {
                        alert('物品数据获取失败');
                        return;
                    }

                    // 智能判断装备位置
                    const equipSlot = this.determineEquipSlot(listName, itemData);
                    if (!equipSlot) {
                        alert('无法确定装备位置');
                        return;
                    }

                    if (!confirm('确定将「' + itemName + '」装备到【' + equipSlot + '】吗？')) {
                        return;
                    }

                    const self = this;
                    updateVariablesWith(function (vars) {
                        const itemPath = 'stat_data.主角.背包.' + listName + '.' + itemKey;
                        const equipPath = 'stat_data.主角.装备栏.' + equipSlot;

                        // 获取要装备的物品
                        const item = _.get(vars, itemPath);
                        if (!item) {
                            alert('物品数据不存在');
                            return vars;
                        }

                        // 检查是否有旧装备
                        const currentEquip = _.get(vars, equipPath);
                        if (currentEquip && typeof currentEquip === 'object') {
                            const oldName = currentEquip.名字 || currentEquip.name || '旧装备';
                            const oldCategory = self.determineCategory(currentEquip);
                            const bagPath = 'stat_data.主角.背包.' + oldCategory;
                            const existingItems = _.get(vars, bagPath, {});

                            // 生成唯一键名
                            let uniqueKey = oldName;
                            let counter = 1;
                            while (existingItems[uniqueKey]) {
                                uniqueKey = oldName + '_' + counter;
                                counter++;
                            }

                            if (!currentEquip.数量) currentEquip.数量 = 1;
                            _.set(vars, bagPath + '.' + uniqueKey, currentEquip);

                            if (typeof toastr !== 'undefined') {
                                toastr.info('已卸下「' + oldName + '」到背包');
                            }
                        }

                        // 装备新物品
                        _.set(vars, equipPath, item);

                        // 从背包删除
                        _.unset(vars, itemPath);

                        return vars;
                    }, { type: 'message', message_id: 'latest' });

                    if (typeof toastr !== 'undefined') {
                        toastr.success('已装备「' + itemName + '」到【' + equipSlot + '】');
                    } else {
                        alert('已装备「' + itemName + '」');
                    }

                    this.refreshAndRender(this.renderStatus);

                } catch (e) {
                    console.error('[装备物品] 失败:', e);
                    if (typeof toastr !== 'undefined') {
                        toastr.error('装备失败: ' + e.message);
                    } else {
                        alert('操作失败: ' + e.message);
                    }
                }
            },

            async handleUnequip(event, equipPath, targetListName, itemName) {
                event.stopPropagation();
                if (!confirm('确定要卸下「' + itemName + '」吗？')) return;

                try {
                    if (typeof updateVariablesWith !== 'function' || typeof _ === 'undefined') {
                        throw new Error('updateVariablesWith 或 lodash 未找到');
                    }

                    const self = this;
                    updateVariablesWith(function (vars) {
                        const fullEquipPath = 'stat_data.主角.装备栏.' + equipPath;
                        const itemData = _.get(vars, fullEquipPath);

                        if (!itemData || typeof itemData !== 'object') {
                            alert('装备数据获取失败');
                            return vars;
                        }

                        // 生成唯一键名（避免重名）
                        const baseName = itemData.名字 || itemData.name || itemName;
                        const bagPath = 'stat_data.主角.背包.' + targetListName;
                        const existingItems = _.get(vars, bagPath, {});

                        let uniqueKey = baseName;
                        let counter = 1;
                        while (existingItems[uniqueKey]) {
                            uniqueKey = baseName + '_' + counter;
                            counter++;
                        }

                        // 确保数量字段存在
                        if (!itemData.数量) {
                            itemData.数量 = 1;
                        }

                        // 放入背包
                        _.set(vars, bagPath + '.' + uniqueKey, itemData);

                        // 清空装备栏（设为 null）
                        _.set(vars, fullEquipPath, null);

                        return vars;
                    }, { type: 'message', message_id: 'latest' });

                    if (typeof toastr !== 'undefined') {
                        toastr.success('已将「' + itemName + '」卸下到背包');
                    } else {
                        alert('已卸下「' + itemName + '」');
                    }

                    this.refreshAndRender(this.renderStatus);
                } catch (e) {
                    console.error('[卸下装备] 失败:', e);
                    if (typeof toastr !== 'undefined') {
                        toastr.error('卸下失败: ' + e.message);
                    } else {
                        alert('操作失败: ' + e.message);
                    }
                }
            },

            // 智能判断装备位置
            determineEquipSlot(category, itemData) {
                const type = (itemData.类型 || '').toLowerCase();

                // 武器类
                if (category === '武器列表') {
                    // 优先判断持握方式
                    if (itemData.持握 === '双手') {
                        return '主武器';
                    }

                    // 根据类型判断
                    if (type.includes('匕首') || type.includes('短剑') || type.includes('副手')) {
                        const choice = prompt('装备到：\n1 - 主武器\n2 - 副手', '2');
                        return choice === '1' ? '主武器' : '副手';
                    }

                    return '主武器';
                }

                // 防具类
                if (category === '防具列表') {
                    const typeMapping = {
                        '头部': '防具.头部',
                        '身体': '防具.身体',
                        '手部': '防具.手部',
                        '腿部': '防具.腿部',
                        '盾': '副手'
                    };

                    for (let key in typeMapping) {
                        if (type.includes(key)) {
                            return typeMapping[key];
                        }
                    }

                    // 如果无法判断，让用户选择
                    const choice = prompt(
                        '选择装备部位：\n1-头部 2-身体 3-手部 4-腿部 5-副手',
                        '2'
                    );
                    const slotMap = {
                        '1': '防具.头部',
                        '2': '防具.身体',
                        '3': '防具.手部',
                        '4': '防具.腿部',
                        '5': '副手'
                    };
                    return slotMap[choice] || '防具.身体';
                }

                // 饰品类
                if (category === '饰品列表') {
                    return '饰品';
                }

                return null;
            },

            // 根据装备数据判断应该放入哪个背包分类
            determineCategory(equipData) {
                const type = (equipData.类型 || '').toLowerCase();

                if (type.includes('武器') || type.includes('剑') || type.includes('匕首') ||
                    type.includes('斧') || type.includes('锤') || type.includes('弓')) {
                    return '武器列表';
                }

                if (type.includes('戒指') || type.includes('项链') || type.includes('饰品')) {
                    return '饰品列表';
                }

                return '防具列表';
            },

            // 删除任务

            // 修改势力影响力（确保总和为100%）
            editFactionInfluence(event) {
                event.stopPropagation();

                try {
                    // 获取当前所有势力数据
                    const factionInfluence = this.SafeGetValue('势力影响力', {});
                    const factions = ['贵族', '执行局', '教会', '贸易同盟', '公会'];

                    // 获取当前值
                    const currentValues = {};
                    factions.forEach(faction => {
                        const factionData = factionInfluence[faction];
                        currentValues[faction] = (factionData && typeof factionData === 'object') ? (factionData.影响力 || 0) : (factionData || 0);
                    });

                    // 显示当前值并让用户输入新值
                    let promptText = '修改势力影响力（确保总和为100%）：\n\n';
                    promptText += '当前值：\n';
                    factions.forEach(faction => {
                        promptText += faction + ': ' + currentValues[faction] + '%\n';
                    });
                    promptText += '\n请依次输入新的百分比值（用逗号分隔）：\n';
                    promptText += '顺序：贵族,执行局,教会,贸易同盟,公会';

                    const currentValuesStr = factions.map(f => currentValues[f]).join(',');
                    const input = prompt(promptText, currentValuesStr);

                    if (input === null || input.trim() === '') return;

                    // 解析输入
                    const values = input.split(',').map(v => parseFloat(v.trim()));

                    if (values.length !== 5) {
                        if (typeof toastr !== 'undefined' && toastr.warning) {
                            toastr.warning('请输入5个数值，用逗号分隔');
                        } else {
                            alert('请输入5个数值，用逗号分隔');
                        }
                        return;
                    }

                    // 检查是否都是有效数字
                    if (values.some(v => isNaN(v) || v < 0)) {
                        if (typeof toastr !== 'undefined' && toastr.warning) {
                            toastr.warning('所有数值必须是非负数');
                        } else {
                            alert('所有数值必须是非负数');
                        }
                        return;
                    }

                    // 检查总和是否为100
                    const sum = values.reduce((a, b) => a + b, 0);
                    if (Math.abs(sum - 100) > 0.01) {
                        if (typeof toastr !== 'undefined' && toastr.warning) {
                            toastr.warning('总和必须为100%（当前总和：' + sum.toFixed(2) + '%）');
                        } else {
                            alert('总和必须为100%（当前总和：' + sum.toFixed(2) + '%）');
                        }
                        return;
                    }

                    if (typeof updateVariablesWith !== 'function') {
                        throw new Error('updateVariablesWith API 未找到');
                    }

                    // 更新所有势力的影响力
                    updateVariablesWith(function (vars) {
                        factions.forEach((faction, index) => {
                            _.set(vars, 'stat_data.势力影响力.' + faction + '.影响力', values[index]);
                        });
                        return vars;
                    }, { type: 'message', message_id: 'latest' });

                    console.log('✅ 已修改势力影响力');

                    if (typeof toastr !== 'undefined' && toastr.success) {
                        toastr.success('势力影响力修改成功');
                    } else {
                        alert('修改成功');
