            // 手动选择相关元素
            const manualSelectContainer = document.getElementById('manual-select-container');
            const manualSelectTitle = document.getElementById('manual-select-title');
            const manualItemDisplay = document.getElementById('manual-item-display');
            const closeManualSelectBtn = document.getElementById('close-manual-select');
            const prevItemBtn = document.getElementById('prev-item-btn');
            const nextItemBtn = document.getElementById('next-item-btn');
            const pageIndicator = document.getElementById('page-indicator');
            const confirmItemBtn = document.getElementById('confirm-item-btn');

            const attributesContainer = document.getElementById('attributes-container');
            const pointsRemainingEl = document.getElementById('points-remaining');
            const attrBonusDisplay = document.getElementById('attr-bonus-display');
            const bonusChildhoodEl = document.getElementById('bonus-childhood');
            const bonusEventEl = document.getElementById('bonus-event');

            // 角色数据
            const character = {
                name: '',
                gender: '',
                age: '',
                birthplace: '',
                description: '',
                childhood: null,
                event: null,
                encounter: null,
                attributes: {
                    力量: 3,
                    敏捷: 3,
                    感知: 3,
                    知识: 3,
                    意志: 3,
                    魅力: 3
                },
                basePoints: 0,
                maxSingleAttr: 0,
                remainingPoints: 0
            };

            // 手动选择状态
            const manualSelectState = {
                currentType: 'childhood', // 'childhood', 'event', 'encounter'
                currentIndex: 0,
                items: [],
                selected: {
                    childhood: null,
                    event: null,
                    encounter: null
                }
            };

            // ========== 主题切换 ==========
            themeToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                themeDropdown.classList.toggle('visible');
            });

            document.addEventListener('click', (e) => {
                if (!themeDropdown.contains(e.target) && !themeToggle.contains(e.target)) {
                    themeDropdown.classList.remove('visible');
                }
            });

            themeOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const theme = option.dataset.theme;
                    themeOptions.forEach(opt => opt.classList.remove('active'));
                    option.classList.add('active');
                    document.body.className = theme === 'light' ? '' : `theme-${theme}`;
                    localStorage.setItem('yananCreatorTheme', theme);
                    themeDropdown.classList.remove('visible');
                });
            });

            const savedTheme = localStorage.getItem('yananCreatorTheme') || 'light';
            if (savedTheme !== 'light') {
                document.body.className = `theme-${savedTheme}`;
            }
            themeOptions.forEach(opt => {
                if (opt.dataset.theme === savedTheme) {
                    opt.classList.add('active');
                } else {
                    opt.classList.remove('active');
                }
            });

            // ========== 入场动画 ==========
            gsap.to('.form-section', {
                opacity: 1,
                y: 0,
                duration: 0.8,
                stagger: 0.2,
                ease: 'power3.out',
                delay: 0.3
            });

            // ========== 初始化属性控制器 ==========
            function initAttributesControls() {
                const attrNames = ['力量', '敏捷', '感知', '知识', '意志', '魅力'];
                attributesContainer.innerHTML = '';

                attrNames.forEach(attr => {
                    const control = document.createElement('div');
                    control.className = 'point-control';
                    control.innerHTML = `
                        <span class="label">${attr}</span>
                        <div class="controls">
                            <button type="button" class="adjust-btn minus" data-attr="${attr}" disabled>-</button>
                            <input type="text" id="attr-${attr}" readonly value="3">
                            <button type="button" class="adjust-btn plus" data-attr="${attr}" disabled>+</button>
                        </div>
                    `;
                    attributesContainer.appendChild(control);
                });
            }

            // ========== 更新属性显示 ==========
            function updateAttributesDisplay() {
                const attrNames = ['力量', '敏捷', '感知', '知识', '意志', '魅力'];

                attrNames.forEach(attr => {
                    const input = document.getElementById(`attr-${attr}`);
                    const plusBtn = document.querySelector(`.adjust-btn.plus[data-attr="${attr}"]`);
                    const minusBtn = document.querySelector(`.adjust-btn.minus[data-attr="${attr}"]`);

                    if (input) input.value = character.attributes[attr];

                    if (plusBtn) {
                        plusBtn.disabled = character.remainingPoints <= 0 ||
                            character.attributes[attr] >= character.maxSingleAttr ||
                            character.basePoints === 0;
                    }

                    if (minusBtn) {
                        minusBtn.disabled = character.attributes[attr] <= 3 ||
                            character.basePoints === 0;
                    }
                });

                pointsRemainingEl.textContent = character.remainingPoints;
            }

            // ========== 属性调整 ==========
            attributesContainer.addEventListener('click', (e) => {
                if (!e.target.matches('.adjust-btn')) return;

                const attr = e.target.dataset.attr;
                const isPlus = e.target.classList.contains('plus');

                if (isPlus) {
                    if (character.remainingPoints > 0 && character.attributes[attr] < character.maxSingleAttr) {
                        character.attributes[attr]++;
                        character.remainingPoints--;
                    }
                } else {
                    if (character.attributes[attr] > 3) {
                        character.attributes[attr]--;
                        character.remainingPoints++;
                    }
                }

                updateAttributesDisplay();
                updateSummary();
            });

            // ========== 手动选择功能 ==========
            manualSelectBtn.addEventListener('click', () => {
                const birthplace = document.querySelector('input[name="birthplace"]:checked');
                if (!birthplace) {
                    alert('请先选择出生地！');
                    return;
                }

                // 初始化手动选择
                manualSelectState.currentType = 'childhood';
                manualSelectState.currentIndex = 0;
                manualSelectState.selected = {
                    childhood: null,
                    event: null,
                    encounter: null
                };

                // 显示手动选择界面
                manualSelectContainer.style.display = 'block';
                // 不隐藏背景显示，让手动选择界面覆盖在上面
                
                // 加载童年选项
                loadManualSelectItems('childhood', birthplace.value);

                // 先重置样式，然后播放动画
                gsap.set(manualSelectContainer, { opacity: 1, y: 0 });
                gsap.fromTo(manualSelectContainer, 
                    { opacity: 0, y: 20 },
                    { opacity: 1, y: 0, duration: 0.5 }
                );
            });

            // 关闭手动选择
            closeManualSelectBtn.addEventListener('click', () => {
                gsap.to(manualSelectContainer, {
                    opacity: 0,
                    y: -20,
                    duration: 0.3,
                    onComplete: () => {
                        manualSelectContainer.style.display = 'none';
                    }
                });
            });

            // 加载手动选择项目
            function loadManualSelectItems(type, birthplace) {
                manualSelectState.currentType = type;
                manualSelectState.currentIndex = 0;

                const titles = {
                    childhood: '选择童年经历',
                    event: '选择重大事件',
                    encounter: '选择邂逅'
                };

                manualSelectTitle.textContent = titles[type];

                if (type === 'childhood' || type === 'event') {
                    const data = backgroundData[type][birthplace];
                    manualSelectState.items = Object.entries(data).map(([key, value]) => ({
                        key,
                        ...value
                    }));
                    // 添加自定义选项
                    manualSelectState.items.push({
                        key: 'custom',
                        name: '自定义',
                        desc: '',
                        effect: '',
                        isCustom: true
                    });
                } else {
                    const data = backgroundData.encounter[birthplace];
                    manualSelectState.items = Object.entries(data).map(([key, value]) => ({
                        key,
                        name: value,
                        desc: ''
                    }));
                    // 添加自定义选项
                    manualSelectState.items.push({
                        key: 'custom',
                        name: '自定义',
                        desc: '',
                        isCustom: true
                    });
                }

                updateManualItemDisplay();
            }

            // 更新手动选择项目显示
            function updateManualItemDisplay() {
                const item = manualSelectState.items[manualSelectState.currentIndex];
                const type = manualSelectState.currentType;

                if (item.isCustom) {
                    // 自定义输入界面
                    if (type === 'childhood') {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">✏️ 自定义童年经历</div>
                            <div style="margin-top: 15px;">
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">名称：</label>
                                <input type="text" id="custom-name" class="form-input" placeholder="输入童年经历的名称..." style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">描述：</label>
                                <textarea id="custom-desc" class="form-input" rows="4" placeholder="描述这段童年经历..."></textarea>
                            </div>
                        `;
                    } else if (type === 'event') {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">✏️ 自定义重大事件</div>
                            <div style="margin-top: 15px;">
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">名称：</label>
                                <input type="text" id="custom-name" class="form-input" placeholder="输入事件的名称..." style="margin-bottom: 15px;">
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">描述：</label>
                                <textarea id="custom-desc" class="form-input" rows="3" placeholder="描述这个事件..." style="margin-bottom: 15px;"></textarea>
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">影响：</label>
                                <input type="text" id="custom-effect" class="form-input" placeholder="输入事件的影响...">
                            </div>
                        `;
                    } else {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">✏️ 自定义邂逅</div>
                            <div style="margin-top: 15px;">
                                <label style="display: block; margin-bottom: 8px; color: var(--text-color); font-weight: 600;">邂逅内容：</label>
                                <textarea id="custom-name" class="form-input" rows="4" placeholder="描述你的邂逅..."></textarea>
                            </div>
                        `;
                    }
                } else {
                    // 正常显示
                    if (type === 'childhood') {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">${item.name}</div>
                            <div class="manual-item-desc">${item.desc}</div>
                        `;
                    } else if (type === 'event') {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">${item.name}</div>
                            <div class="manual-item-desc">${item.desc}</div>
                            <div class="manual-item-effect">▸ 影响: ${item.effect}</div>
                        `;
                    } else {
                        manualItemDisplay.innerHTML = `
                            <div class="manual-item-title">${item.name}</div>
                        `;
                    }
                }

                // 更新页码
                pageIndicator.textContent = `${manualSelectState.currentIndex + 1} / ${manualSelectState.items.length}`;

                // 更新按钮状态
                prevItemBtn.disabled = manualSelectState.currentIndex === 0;
                nextItemBtn.disabled = manualSelectState.currentIndex === manualSelectState.items.length - 1;

                // 动画 - 只使用水平滑动，不改变透明度
                gsap.fromTo(manualItemDisplay, 
                    { x: 20 },
                    { x: 0, duration: 0.3, ease: 'power2.out' }
                );
            }

            // 上一个
            prevItemBtn.addEventListener('click', () => {
                if (manualSelectState.currentIndex > 0) {
                    manualSelectState.currentIndex--;
                    updateManualItemDisplay();
                }
            });

            // 下一个
            nextItemBtn.addEventListener('click', () => {
                if (manualSelectState.currentIndex < manualSelectState.items.length - 1) {
                    manualSelectState.currentIndex++;
                    updateManualItemDisplay();
                }
            });

            // 确认选择
            confirmItemBtn.addEventListener('click', () => {
                let item = manualSelectState.items[manualSelectState.currentIndex];
                const type = manualSelectState.currentType;
                const birthplace = document.querySelector('input[name="birthplace"]:checked').value;

                // 如果是自定义选项，获取输入内容
                if (item.isCustom) {
                    const customName = document.getElementById('custom-name')?.value.trim();
                    const customDesc = document.getElementById('custom-desc')?.value.trim();
                    const customEffect = document.getElementById('custom-effect')?.value.trim();

                    if (!customName) {
                        alert('请输入内容！');
                        return;
                    }

                    // 创建自定义项
                    if (type === 'childhood') {
                        item = {
                            key: 'custom',
                            name: customName,
                            desc: customDesc || '自定义童年经历',
                            skills: []
                        };
                    } else if (type === 'event') {
                        if (!customDesc) {
                            alert('请输入描述！');
                            return;
                        }
                        item = {
                            key: 'custom',
                            name: customName,
                            desc: customDesc,
                            effect: customEffect || '自定义影响'
                        };
                    } else {
                        item = {
                            key: 'custom',
                            name: customName,
                            desc: ''
                        };
                    }
                }

                // 保存当前选择
                if (type === 'childhood') {
                    manualSelectState.selected.childhood = item;
                    character.childhood = item;
                    // 进入事件选择
                    loadManualSelectItems('event', birthplace);
                } else if (type === 'event') {
                    manualSelectState.selected.event = item;
                    character.event = item;
                    // 进入邂逅选择
                    loadManualSelectItems('encounter', birthplace);
                } else {
                    manualSelectState.selected.encounter = item.name;
                    character.encounter = item.name;
                    
                    // 全部选择完成，显示结果
                    displayManualSelectionResults();
                    
                    // 关闭手动选择界面
                    gsap.to(manualSelectContainer, {
                        opacity: 0,
                        y: -20,
                        duration: 0.3,
                        onComplete: () => {
                            manualSelectContainer.style.display = 'none';
                        }
                    });
                }
            });

            // 显示手动选择结果
            function displayManualSelectionResults() {
                const bp = document.querySelector('input[name="birthplace"]:checked').value;

                // 显示结果
                bgChildhood.innerHTML = `
                    <div class="bg-item-title">📖 童年 (手动选择)</div>
                    <div class="bg-item-name">${character.childhood.name}</div>
                    <div class="bg-item-desc">${character.childhood.desc}</div>
                `;

                bgEvent.innerHTML = `
                    <div class="bg-item-title">📖 重大事件 (手动选择)</div>
                    <div class="bg-item-name">${character.event.name}</div>
                    <div class="bg-item-desc">${character.event.desc}</div>
                    <div class="bg-item-skills">▸ 影响: ${character.event.effect}</div>
                `;

                bgEncounter.innerHTML = `
                    <div class="bg-item-title">📖 邂逅 (手动选择)</div>
                    <div class="bg-item-name">${character.encounter}</div>
                `;

                backgroundDisplay.classList.add('visible');

                // 动画
                gsap.killTweensOf('.bg-item');
                gsap.set('.bg-item', { opacity: 1, y: 0 });
                gsap.from('.bg-item', {
                    opacity: 0,
                    y: 20,
                    duration: 0.5,
                    stagger: 0.2
                });

                // 初始化属性点数
                character.basePoints = bp === '核心区' ? 35 : 30;
                character.maxSingleAttr = bp === '核心区' ? 8 : 7;

                // 重置属性为最低值
                Object.keys(character.attributes).forEach(key => {
                    character.attributes[key] = 3;
                });

                character.remainingPoints = character.basePoints - 18;

                updateAttributesDisplay();

                // 显示加成预览
                const childhoodBonus = childhoodBonusMap[character.childhood.name] || {};
                const eventBonus = eventBonusMap[character.event.name] || {};

                bonusChildhoodEl.textContent = `童年加成: ${formatBonus(childhoodBonus)}`;
                bonusEventEl.textContent = `事件加成: ${formatBonus(eventBonus)}`;
                attrBonusDisplay.style.display = 'block';

                updateSummary();
            }

            // ========== 骰子投掷 ==========
            rollBackgroundBtn.addEventListener('click', () => {
                const birthplace = document.querySelector('input[name="birthplace"]:checked');
                if (!birthplace) {
                    alert('请先选择出生地！');
                    return;
                }

                const bp = birthplace.value;

                // 投掷三次2D6
                const roll1 = roll2D6();
                const roll2 = roll2D6();
                const roll3 = roll2D6();

                // 获取结果
                character.childhood = backgroundData.childhood[bp][roll1];
                character.event = backgroundData.event[bp][roll2];
                character.encounter = backgroundData.encounter[bp][roll3];

                // 显示结果
                bgChildhood.innerHTML = `
                    <div class="bg-item-title">🎲 童年 (投掷结果: ${roll1})</div>
                    <div class="bg-item-name">${character.childhood.name}</div>
                    <div class="bg-item-desc">${character.childhood.desc}</div>
                `;

                bgEvent.innerHTML = `
                    <div class="bg-item-title">🎲 重大事件 (投掷结果: ${roll2})</div>
                    <div class="bg-item-name">${character.event.name}</div>
                    <div class="bg-item-desc">${character.event.desc}</div>
                    <div class="bg-item-skills">▸ 影响: ${character.event.effect}</div>
                `;

                bgEncounter.innerHTML = `
                    <div class="bg-item-title">🎲 邂逅 (投掷结果: ${roll3})</div>
                    <div class="bg-item-name">${character.encounter}</div>
                `;

                backgroundDisplay.classList.add('visible');
                
                // 先杀死所有正在进行的动画，然后重置opacity为1
                gsap.killTweensOf('.bg-item');
                gsap.set('.bg-item', { opacity: 1, y: 0 });
                
                // 再执行新的动画
                gsap.from('.bg-item', {
                    opacity: 0,
                    y: 20,
                    duration: 0.5,
                    stagger: 0.2
                });

                // 初始化属性点数
                character.basePoints = bp === '核心区' ? 35 : 30;
                character.maxSingleAttr = bp === '核心区' ? 8 : 7;

                // 重置属性为最低值
                Object.keys(character.attributes).forEach(key => {
                    character.attributes[key] = 3;
                });

                character.remainingPoints = character.basePoints - 18; // 6个属性 × 3点

                updateAttributesDisplay();

                // 显示加成预览
                const childhoodBonus = childhoodBonusMap[character.childhood.name] || {};
                const eventBonus = eventBonusMap[character.event.name] || {};

                bonusChildhoodEl.textContent = `童年加成: ${formatBonus(childhoodBonus)}`;
                bonusEventEl.textContent = `事件加成: ${formatBonus(eventBonus)}`;
                attrBonusDisplay.style.display = 'block';

                updateSummary();
            });

            // ========== 出生地切换重置属性 ==========
            birthplaceInputs.forEach(radio => {
                radio.addEventListener('change', () => {
                    // 清空经历
                    character.childhood = null;
                    character.event = null;
                    character.encounter = null;
                    backgroundDisplay.classList.remove('visible');
                    attrBonusDisplay.style.display = 'none';

                    // 重置属性
                    character.basePoints = 0;
                    character.remainingPoints = 0;
                    Object.keys(character.attributes).forEach(key => {
                        character.attributes[key] = 3;
                    });

                    updateAttributesDisplay();
                    updateSummary();
                });
            });

            // ========== 实时更新总览 ==========
            function updateSummary() {
                const name = charName.value.trim() || '{{user}}';
                const gender = charGender.value.trim() || '未设定';
                const age = charAge.value || '未设定';
                const birthplace = document.querySelector('input[name="birthplace"]:checked')?.value || '未选择';
                const description = charDescription.value.trim() || '未填写';

                // 计算最终属性（基础 + 加成）
                let finalAttributes = { ...character.attributes };

                if (character.childhood) {
                    const childhoodBonus = childhoodBonusMap[character.childhood.name] || {};
                    Object.entries(childhoodBonus).forEach(([attr, value]) => {
                        finalAttributes[attr] = Math.max(3, Math.min(20, finalAttributes[attr] + value));
                    });
                }

                if (character.event) {
                    const eventBonus = eventBonusMap[character.event.name] || {};
                    Object.entries(eventBonus).forEach(([attr, value]) => {
                        finalAttributes[attr] = Math.max(3, Math.min(20, finalAttributes[attr] + value));
                    });
                }

                // 计算衍生数值
                const hp = 10 + (finalAttributes.力量 * 5) + (finalAttributes.意志 * 2);
                const stamina = 5 + finalAttributes.敏捷 + finalAttributes.力量;
                const resistance = birthplace === '核心区' ? 20 : 0;
                const pollution = birthplace === '核心区' ? 0 : 5;

                let summary = `

      🌫️ 蒸汽朋克·依希利亚 - 角色档案
═══════════════════════════════════════

姓名: ${name}
性别: ${gender}
年龄: ${age}${age !== '未设定' ? '岁' : ''}
出生地: ${birthplace}

`;

                if (character.childhood) {
                    summary += `【命运轨迹】
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

${character.childhood.desc}

🎲 重大事件: ${character.event.name}
${character.event.desc}
▸ 影响: ${character.event.effect}

🎲 邂逅: ${character.encounter}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

【基础属性】(总计: ${character.basePoints}点)
力量: ${character.attributes.力量} → 最终: ${finalAttributes.力量}
敏捷: ${character.attributes.敏捷} → 最终: ${finalAttributes.敏捷}
感知: ${character.attributes.感知} → 最终: ${finalAttributes.感知}
知识: ${character.attributes.知识} → 最终: ${finalAttributes.知识}
意志: ${character.attributes.意志} → 最终: ${finalAttributes.意志}
魅力: ${character.attributes.魅力} → 最终: ${finalAttributes.魅力}

【衍生数值】
生命值: ${hp}
体力值: ${stamina}
护甲值: 0 (无装备)

`;
                }

                summary += `【身体特征与补充】
${description}

═══════════════════════════════════════
`;

                summaryPreview.textContent = summary;
            }

            // 监听输入
            [charName, charGender, charAge, charDescription].forEach(input => {
                input.addEventListener('input', updateSummary);
            });

            birthplaceInputs.forEach(radio => {
                radio.addEventListener('change', updateSummary);
            });

            // ========== 表单验证 ==========
            function validateForm() {
                const gender = charGender.value.trim();
                const age = charAge.value;
                const birthplace = document.querySelector('input[name="birthplace"]:checked');

                if (!gender) {
                    validationMsg.textContent = '❌ 请填写性别';
                    return false;
                }

                if (!age || age < 1) {
                    validationMsg.textContent = '❌ 请填写有效年龄';
                    return false;
                }

                if (!birthplace) {
                    validationMsg.textContent = '❌ 请选择出生地';
                    return false;
                }

                if (!character.childhood) {
                    validationMsg.textContent = '❌ 请投掷骰子决定经历';
                    return false;
                }

                if (character.remainingPoints > 0) {
                    validationMsg.textContent = `❌ 还有 ${character.remainingPoints} 点未分配`;
                    return false;
                }

                validationMsg.textContent = '';
                return true;
            }

            [charGender, charAge].forEach(input => {
                input.addEventListener('input', validateForm);
            });

            birthplaceInputs.forEach(radio => {
