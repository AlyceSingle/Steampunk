<body>
    <div class="area-sheet">
        <div class="sheet-header">
            <h1 class="sheet-title" data-name>区域名称</h1>
            <div class="sheet-subtitle">AREA PROFILE</div>
        </div>

        <div class="area-card">
            <!-- 核心信息 -->
            <div class="core-info-section" data-core-info>
                <div class="info-item">
                    <span class="info-label">所在区域</span>
                    <span class="info-value">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">包含子区域</span>
                    <span class="info-value">-</span>
                </div>
            </div>

            <div class="divider"></div>

            <!-- 详细信息展示区 -->
            <div class="profile-section" id="profile-display">
                <div class="profile-item" data-field="区域描述">
                    <div class="section-header">
                        <h3 class="profile-label">区域描述</h3>
                    </div>
                    <div class="profile-content">-</div>
                </div>
                
                <div id="sub-areas-container">
                    <!-- 动态生成的子区域 -->
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn" id="save-btn">
                <span>保存到世界书</span>
            </button>
        </div>
    </div>

    <div id="loading-indicator" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div>正在加载区域数据...</div>
    </div>

    <script id="data-source" type="text/yaml">$1</script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
        // ========== 工具函数 ==========
        function getSmartArray(input) { 
            if (input === undefined || input === null) return []; 
            if (Array.isArray(input)) return input; 
            const str = String(input).trim(); 
            if (!str || str.toLowerCase() === 'null' || str.toLowerCase() === 'none') return []; 
            let processed = str.replace(/\]\s*\[/g, '], ['); 
            processed = processed.replace(/^[\s\["']+|[\s\]"']+$/g, ''); 
            const items = processed.split(/[,;|，；、]/); 
            return items.map(s => s.trim().replace(/^['"\[\(]+|['"\]\)]+$/g, '')).filter(s => s && s !== 'null'); 
        }

        function cleanYaml(yamlStr){
            if(!yamlStr)return'';
            yamlStr=yamlStr.replace(/\u00A0/g,' ').replace(/\t/g,'  ').replace(/：/g,': ').replace(/，/g,',').replace(/；/g,';').replace(/】/g,']').replace(/【/g,'[');
            const lines=yamlStr.split('\n');
            // 针对区域信息的敏感关键词
            const sensitiveKeys=['区域名称','所在区域','区域描述','子区域','名称','描述'];
            const cleanedLines=lines.map(line=>{
                const match=line.match(/^(\s*)([-\w\u4e00-\u9fa5]+)\s*:\s*(.+)$/);
                if(!match)return line;
                const indent=match[1];
                const key=match[2];
                let val=match[3].trim();
                // 保留块级标示符
                if(val.startsWith('|')||val.startsWith('>'))return line;
                
                const isSensitive=sensitiveKeys.some(k=>key.includes(k));
                const hasDangerousChars=/[\{\}\[\]]/.test(val);
                const hasQuoteInside=val.includes('\"');
                const isFullyQuoted=/^["'].*["']$/.test(val);
                if((isSensitive||hasDangerousChars||hasQuoteInside)&&!isFullyQuoted){
                    val=val.replace(/"/g,'\\"');
                    return`${indent}${key}: \"${val}\"`;
                }
                return line;
            });
            return cleanedLines.join('\n');
        }

        function parseRobust(yamlStr) { 
            try { 
                // 尝试移除最外层的标签（如果有）
                let content = yamlStr.trim();
                content = content.replace(/<\/?area_info>/g, '');
                return jsyaml.load(cleanYaml(content)); 
            } catch (e) { 
                console.error('YAML Parsing failed:', e); 
                return null; 
            } 
        }

        function hasText(val) { 
            if (val === null || val === undefined) return false; 
            const s = String(val).trim().toLowerCase(); 
            return s !== '' && s !== 'null' && s !== 'none' && s !== '[]' && s !== '无'; 
        }

        // ========== 数据获取与渲染 ==========
        let globalAreaData = null;
        let globalOriginalYaml = '';

        function renderAreaProfile(data, originalYaml) {
            if (!data) {
                showToast('数据解析失败', 'error');
                return;
            }

            globalAreaData = data;
            globalOriginalYaml = originalYaml;

            // 渲染区域名称
            const nameEl = document.querySelector('[data-name]');
            if (nameEl) {
                nameEl.textContent = data.区域名称 || '未知区域';
            }

            // 渲染核心信息
            const coreInfoEl = document.querySelector('[data-core-info]');
            if (coreInfoEl) {
                const subAreaList = getSmartArray(data.子区域).join(' / ') || '无';
                coreInfoEl.innerHTML = `
                    <div class="info-item">
                        <span class="info-label">所在区域</span>
                        <span class="info-value">${data.所在区域 || '未知'}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">包含子区域</span>
                        <span class="info-value" style="font-size: 0.9em;">${subAreaList}</span>
                    </div>
                `;
            }

            // 渲染主描述
            const descEl = document.querySelector(`[data-field="区域描述"] .profile-content`);
            if (descEl) {
                descEl.textContent = data.区域描述 || '暂无描述';
            }

            // 动态渲染详细子区域
            const subAreasContainer = document.getElementById('sub-areas-container');
            subAreasContainer.innerHTML = '';
            
            // 获取所有的键
            const keys = Object.keys(data);
            const knownKeys = ['区域名称', '所在区域', '区域描述', '子区域'];
            const subAreaList = getSmartArray(data.子区域);
            
            // 筛选出可能是子区域描述的字段
            // 逻辑：不在已知字段中，且可能是子区域列表中的名字，或者看起来像子区域名字的键
            const subAreaDetails = keys.filter(key => 
                !knownKeys.includes(key) && hasText(data[key])
            );

            if (subAreaDetails.length > 0) {
                 // 添加分割线标题
                const header = document.createElement('div');
                header.className = 'profile-item';
                header.innerHTML = '<h3 class="profile-label">区域详情</h3>';
                subAreasContainer.appendChild(header);

                subAreaDetails.forEach(key => {
                    const el = document.createElement('div');
                    el.className = 'sub-area-card';
                    el.innerHTML = `
                        <div class="sub-area-title">${key}</div>
                        <div class="profile-content">${data[key]}</div>
                    `;
                    subAreasContainer.appendChild(el);
                });
            }

            // 隐藏加载动画
            const loadingEl = document.getElementById('loading-indicator');
            if (loadingEl) {
                loadingEl.classList.add('hidden');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = type === 'success' ? '✓ ' + message : '! ' + message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ========== 保存到世界书 ==========
        let hasSaved = false;

        function generateYAML(data) {
            const formatBlock = (text) => {
                if (!text) return '';
                return `|\n  ${text.replace(/\n/g, '\n  ')}`; 
            };

            const formatList = (arr) => {
                const items = getSmartArray(arr);
                return items.length > 0 ? items.join(', ') : '无';
            };

            const areaName = data.区域名称 || '未知';
            
            let content = [
                `区域名称: ${areaName}`,
                `所在区域: ${data.所在区域 || '无'}`,
                `区域描述: ${formatBlock(data.区域描述 || '')}`,
                `子区域: ${formatList(data.子区域)}`
            ].join('\n');

            // 动态添加子区域详情
            const knownKeys = ['区域名称', '所在区域', '区域描述', '子区域'];
            Object.keys(data).forEach(key => {
                if (!knownKeys.includes(key) && hasText(data[key])) {
                    content += `\n${key}: ${formatBlock(data[key])}`;
                }
            });

            return `<${areaName}>\n${content}\n</${areaName}>`;
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-btn');
            
            if (hasSaved) {
                showToast('已经保存过了，无需重复保存', 'error');
                return;
            }

            if (!globalAreaData) {
                showToast('没有可保存的数据', 'error');
                return;
            }

            btn.disabled = true;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const api = window.TavernHelper || window;
                
                if (typeof api.getWorldbookNames !== 'function' || typeof api.createWorldbookEntries !== 'function') {
                    throw new Error('未检测到 Worldbook API');
                }

                // 世界书名称
                const worldbookName = '在这个蒸汽朋克且阶级分化的世界，多样的政治势力，外加一群可爱美少女，我的异世界冒险不可能这么丰富多彩！';
                
                const books = await api.getWorldbookNames();
                if (!books.includes(worldbookName)) {
                    await api.createWorldbook(worldbookName, []);
                }

                const areaName = globalAreaData.区域名称 || '未知区域';
                const parentArea = globalAreaData.所在区域 || '';
                
                // 触发词：区域名称 + 所在区域
                const keys = [areaName];
                if (parentArea && parentArea !== '无') {
                    keys.push(parentArea);
                }

                // 始终用地点名称标签包裹重新生成内容
                const contentToSave = generateYAML(globalAreaData);

                const entry = {
                    name: areaName,
                    enabled: true,
                    strategy: {
                        type: 'selective',
                        keys: keys, // 触发词
                        keys_secondary: { logic: 'and_any', keys: [] },
                        scan_depth: 'same_as_global'
                    },
                    position: {
                        type: 'before_character_definition',
                        role: 'system', // 顺位
                        depth: 0,
                        order: 2950 // 顺序 2950
                    },
                    content: contentToSave,
                    probability: 100,
                    recursion: {
                        prevent_incoming: false,
                        prevent_outgoing: true, // 防止进一步递归
                        delay_until: null
                    },
                    match_whole_words: false, // 绿灯（通常对应非整词匹配或根据具体实现，这里假设默认行为符合需求，或者保持false灵活匹配）
                    effect: {
                        sticky: null,
                        cooldown: null,
                        delay: null
                    }
                };
                
                // Worldbook API 某些版本可能通过 extension 传递 recursion 字段，
                // 或者 API 结构略有不同。这里假设与 createWorldbookEntries 兼容的标准结构。
                // 如果是新版 SillyTavern，Entry 结构可能需要 exact match。
                // 修正：绿灯通常指 "Match Whole Words" = False (可匹配部分词) 或者 Always On。
                // 既然有触发词，那就是 Selective。
                // 顺位这里映射为 order: 2950。
                
                await api.createWorldbookEntries(worldbookName, [entry]);
                hasSaved = true;
                showToast('✓ 保存成功！区域已录入世界书', 'success');
                btn.innerHTML = '✓ 已保存';
            } catch (err) {
                console.error('保存失败:', err);
                showToast('保存失败: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        // ========== 初始化 ==========
        const yamlDataSource = document.getElementById('data-source');
        if (yamlDataSource) {
            const rawYaml = yamlDataSource.textContent;
            if (rawYaml && rawYaml.trim()) {
                const data = parseRobust(rawYaml);
                if (data) { 
                    renderAreaProfile(data, rawYaml); 
                } else { 
                    const loadingEl = document.getElementById('loading-indicator');
                    if (loadingEl) {
                         loadingEl.innerHTML = `<div style="color: #ff6b6b; padding: 20px; font-family: sans-serif; text-align: center; background: rgba(255,255,255,0.9); border-radius: 10px;"><h3>解析错误</h3><p>数据格式似乎有误，请检查YAML。</p></div>`; 
                    }
                }
            }
        }
    });
    </script>
</body>
